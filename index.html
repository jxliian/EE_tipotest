ste, ampliando masivamente el número de rutas, abaratando precios y multiplicando la conectividad de los ciudadanos.","tag":"T5","_type":"vf"},{"text":"La política de liberalización de los servicios en España ha generado una redistribución de la renta desde los consumidores hacia los empresarios y trabajadores del sector.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La liberalización ha generado el efecto distributivo inverso: al fomentar la competencia y reducir los precios de los servicios, ha provocado una redistribución de rentas desde los empresarios (que pierden el control monopolístico) y trabajadores hacia los consumidores.","tag":"T5","_type":"vf"},{"text":"En el sector de la distribución comercial, la existencia de normativas diferentes entre las regiones españolas supone un obstáculo para el desarrollo de estrategias globales de empresa.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las notables disparidades normativas autonómicas (en horarios, rebajas, fiscalidad y licencias para grandes superficies) fragmentan de facto la unidad de mercado, lastrando el desarrollo de estrategias comerciales integradas a nivel nacional.","tag":"T5","_type":"vf"},{"text":"A pesar del proceso de apertura a la competencia, el mercado de telefonía móvil en España muestra una tendencia reciente hacia la fragmentación, reduciendo la cuota de mercado de los grandes operadores.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ocurre lo contrario: la tendencia reciente muestra un proceso de intensa concentración corporativa. En 2024, la cuota de mercado combinada de los tres operadores dominantes supera claramente el 90%.","tag":"T5","_type":"vf"},{"text":"En la comercialización de productos farmacéuticos, la normativa vigente prohíbe explícitamente que las farmacias desarrollen estrategias de integración vertical u horizontal.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La actual regulación de oficinas de farmacia en España prohíbe expresamente cualquier tipo de estrategia de integración (ya sea vertical con laboratorios o distribuidores, u horizontal mediante cadenas corporativas), siendo obligatoria la titularidad personal de un farmacéutico colegiado.","tag":"T5","_type":"vf"},{"text":"La entrada de nuevos competidores en el mercado postal ha desplazado a la Sociedad Estatal Correos y Telégrafos, que ha dejado de ser el operador líder del sector.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"A pesar de que la competencia en el sector se ha intensificado enormemente obligando a mejorar la eficiencia, el operador histórico (la Sociedad Estatal Correos y Telégrafos) sigue reteniendo cómodamente el liderazgo global del mercado postal.","tag":"T5","_type":"vf"},{"text":"El saldo de la Balanza de Rentas Primarias volvió a tener un mayor déficit en 2023 y 2024 debido a la subida de los tipos de interés.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La subida de tipos de interés provocada por la elevada inflación causó que esta balanza volviera a posiciones deficitarias en esos años[cite: 74].","tag":"T6","_type":"vf"},{"text":"Antes de la crisis de 2008, el elevado déficit comercial se vio agravado por una inflación en España superior a la de sus socios comerciales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El diferencial de inflación superior respecto a los países del entorno restó competitividad exterior a la economía española[cite: 297].","tag":"T6","_type":"vf"},{"text":"La elasticidad renta de las importaciones españolas es significativamente superior a la elasticidad renta de las exportaciones respecto a la demanda extranjera.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La elasticidad renta de las importaciones es de 2, mientras que la de las exportaciones es próxima a 1, lo que tiende a empeorar el saldo comercial cuando España crece[cite: 264, 265].","tag":"T6","_type":"vf"},{"text":"La adhesión a la Unión Europea supuso una diversificación geográfica que redujo la dependencia del mercado comunitario.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La entrada en la UE reforzó la concentración y los vínculos comerciales con el mercado comunitario en lugar de reducirlos[cite: 311].","tag":"T6","_type":"vf"},{"text":"Estados Unidos, Reino Unido, Francia y Alemania son los países de origen de más de la mitad del stock de inversión extranjera en España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Estos cuatro países acapararon más del 51% del stock total de inversión extranjera recibida en 2023[cite: 469].","tag":"T6","_type":"vf"},{"text":"Durante las salidas netas de capital en 2011 y 2012, la financiación se obtuvo principalmente a través de la entrada de inversión extranjera en cartera.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las salidas de capital se financiaron con la liquidez de los pasivos del Banco de España frente al Eurosistema, ya que la inversión extranjera neta fue incluso negativa[cite: 162, 163].","tag":"T6","_type":"vf"},{"text":"La cuenta de errores y omisiones se utiliza para anotar las discrepancias que impiden el equilibrio contable de la Balanza de Pagos.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Es la partida de ajuste contable cuando hay diferencias entre la cuenta financiera y la suma de las cuentas corriente y de capital[cite: 129].","tag":"T6","_type":"vf"},{"text":"España se ha consolidado como un receptor destacado de proyectos greenfield a escala global, especialmente en el sector de las energías renovables.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"España ocupa posiciones muy destacadas mundialmente como receptora de este tipo de proyectos en el ámbito de las renovables[cite: 467].","tag":"T6","_type":"vf"},{"text":"La proximidad geográfica y la ausencia de obstáculos al comercio son considerados factores nacionales que impulsan el comercio intraindustrial.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Estos factores, junto a la similitud en el nivel de renta y desarrollo, son impulsores clave de este tipo de intercambios[cite: 383].","tag":"T6","_type":"vf"},{"text":"Los fondos comunitarios FEADER y FEDER constituyen históricamente el núcleo de los ingresos de la Cuenta de Capital en España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las transferencias de la UE, destacando estos fondos, han supuesto tradicionalmente el 90% de los ingresos de esta cuenta[cite: 90].","tag":"T6","_type":"vf"},{"text":"Las economías periféricas de la UE, como España e Italia, presentan índices de comercio intraindustrial superiores a las economías centrales como Alemania.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las economías centrales tienen índices altos de comercio intraindustrial, mientras que las periféricas tienen índices inferiores[cite: 379, 380].","tag":"T6","_type":"vf"},{"text":"La ampliación de la Unión Europea a países de menor renta supuso un incremento de los fondos comunitarios recibidos por España en la cuenta de capital.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La ampliación supuso un recorte de los fondos recibidos por España al desviarse hacia los nuevos países con menor renta[cite: 91].","tag":"T6","_type":"vf"},{"text":"La tasa de cobertura del comercio de bienes ha superado el cien por cien de forma estructural desde la crisis de 2008.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La tasa de cobertura de bienes ha mejorado pero sigue por debajo del 100% (86,9% en 2022); es el saldo incluyendo servicios el que supera el 100%[cite: 226, 227].","tag":"T6","_type":"vf"},{"text":"La adhesión a la Unión Europea supuso un estímulo para la llegada de inversiones extranjeras en manufacturas de intensidad tecnológica media-alta y alta.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La integración reforzó el interés inversor en estos sectores industriales más avanzados y dependientes de importaciones[cite: 410].","tag":"T6","_type":"vf"},{"text":"Un déficit persistente en la balanza por cuenta corriente implica una necesidad de financiación exterior y acumulación de deuda.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Los saldos negativos obligan a recurrir al ahorro externo, lo que incrementa el peso de la deuda externa del país[cite: 51, 53].","tag":"T6","_type":"vf"},{"text":"La dotación de capital humano y de infraestructuras han sido factores determinantes para atraer inversión extranjera directa a España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Ambas dotaciones se citan como ventajas competitivas que incentivaron la entrada de capitales extranjeros[cite: 413, 414].","tag":"T6","_type":"vf"},{"text":"El grueso del déficit comercial español se concentra en los intercambios con China, países asiáticos industrializados y la OPEP.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"España tiene superávit con la mayoría de la UE, pero el déficit se genera principalmente con estas regiones y países[cite: 324, 325].","tag":"T6","_type":"vf"},{"text":"La difusión de tecnología a través de bienes importados ha sido un factor clave para la convergencia real de España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La importación de bienes de equipo y tecnología ha impulsado el crecimiento económico y el acercamiento a los niveles de los países avanzados[cite: 34].","tag":"T6","_type":"vf"},{"text":"La mayor desventaja comercial de España se localiza en los sectores de alimentos y bienes de consumo duradero.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"España tiene una ventaja comercial en alimentos y automóviles; la desventaja está en energía y bienes de equipo[cite: 345, 346].","tag":"T6","_type":"vf"},{"text":"Antes de la integración en la UE, la devaluación del tipo de cambio era una medida habitual para corregir el déficit exterior.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Al no estar en la unión monetaria, los gobiernos devaluaban la moneda para abaratar exportaciones y encarecer importaciones[cite: 173, 174].","tag":"T6","_type":"vf"},{"text":"La fase expansiva entre 1995 y 2007 se caracterizó por una reducción drástica del gasto de las familias en bienes de consumo duradero.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Dicha fase se caracterizó por un aumento del gasto de las familias en consumo duradero y vivienda por la facilidad de crédito[cite: 181].","tag":"T6","_type":"vf"},{"text":"En términos de stock acumulado de inversión emitida, España ocupa actualmente la primera posición como inversor mundial dentro de la Unión Europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"España ocupa la 8ª posición en la UE y la 17ª a nivel mundial como emisor de inversión[cite: 424].","tag":"T6","_type":"vf"},{"text":"En términos contables, el saldo de la cuenta financiera debe ser siempre independiente de la suma de las cuentas corriente y de capital.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Contablemente el saldo de la cuenta financiera debe ser igual a la suma de los saldos de la cuenta corriente y de capital[cite: 127, 128].","tag":"T6","_type":"vf"},{"text":"Durante la pandemia de Covid-19, las exportaciones españolas mantuvieron su crecimiento mientras las importaciones caían abruptamente.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Durante la pandemia se produjo una caída abrupta tanto de las exportaciones como de las importaciones[cite: 307].","tag":"T6","_type":"vf"},{"text":"La estructura sectorial de las exportaciones españolas se ha transformado radicalmente en la última década, abandonando los bienes intermedios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La estructura sectorial se define como estable en el tiempo, manteniendo un peso relevante en bienes intermedios e industriales[cite: 336, 339].","tag":"T6","_type":"vf"},{"text":"La reforma laboral de 2012 otorgó prioridad aplicativa a los convenios colectivos de empresa sobre los de sector en materias como el salario base y los complementos salariales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reforma de 2012 estableció la prioridad aplicativa del convenio de empresa sobre el sectorial en un amplio número de materias, incluidos el salario base y los complementos, con el objetivo de descentralizar la negociación colectiva y flexibilizar la estructura salarial.","tag":"T7","_type":"vf"},{"text":"La reforma laboral de 2012 mantuvo el límite de ultraactividad indefinido para los convenios colectivos denunciados, igual que en la normativa anterior.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La reforma de 2012 limitó la ultraactividad de los convenios a un máximo de un año tras su denuncia. Si en ese plazo no se alcanzaba un nuevo acuerdo, el convenio perdía vigencia, lo que supuso un cambio radical respecto a la normativa previa que permitía una ultraactividad indefinida.","tag":"T7","_type":"vf"},{"text":"La reforma laboral de 2012 redujo la indemnización por despido improcedente de 45 días por año trabajado a 33 días, con un máximo de 24 mensualidades.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Efectivamente, la reforma de 2012 abarató el coste del despido improcedente, pasando de 45 días por año trabajado con un máximo de 42 mensualidades, a 33 días por año con un tope de 24 mensualidades para los contratos formalizados tras la entrada en vigor de la norma.","tag":"T7","_type":"vf"},{"text":"Antes de la reforma de 2012, para llevar a cabo un Expediente de Regulación de Empleo (ERE) de carácter extintivo era necesaria la autorización previa de la autoridad laboral.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Con la normativa anterior, los EREs extintivos requerían la aprobación administrativa de la autoridad laboral. La reforma de 2012 eliminó esta autorización previa, dejando la decisión final en manos del empresario tras un período de consultas con los representantes de los trabajadores.","tag":"T7","_type":"vf"},{"text":"La reforma laboral de 2021 mantuvo la prioridad del convenio de empresa sobre el sectorial en materia salarial, tal y como estableció la reforma de 2012.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La reforma de 2021 revirtió este aspecto de la reforma de 2012. Recuperó la primacía del convenio sectorial sobre el de empresa en materia salarial, de modo que los convenios sectoriales vuelven a fijar el suelo mínimo de salarios que los convenios de empresa no pueden rebajar.","tag":"T7","_type":"vf"},{"text":"La reforma laboral de 2021 establece que, por defecto, los contratos de trabajo se presumen de carácter indefinido.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Uno de los pilares de la reforma de 2021 es la presunción de indefinición del contrato. La contratación temporal queda restringida a dos causas específicas y tasadas: las circunstancias de la producción y la sustitución de personas trabajadoras, debiendo justificarse siempre su uso.","tag":"T7","_type":"vf"},{"text":"Tras la reforma de 2021, el encadenamiento de contratos temporales por más de 18 meses en un período de 24 meses da lugar a la conversión automática en contrato indefinido.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reforma de 2021 estableció que la persona trabajadora que en un período de 24 meses haya estado contratada temporalmente durante más de 18 meses con la misma empresa, adquiere automáticamente la condición de trabajadora indefinida.","tag":"T7","_type":"vf"},{"text":"La reforma de 2021 suprimió el contrato de obra o servicio determinado por considerarlo una fuente de fraude en la contratación temporal.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Efectivamente, la reforma de 2021 eliminó el contrato de obra o servicio determinado, así como el contrato eventual por circunstancias de la producción tal como se conocía. Los sustituyó por dos nuevas modalidades de contrato temporal de causas muy tasadas para evitar el abuso de la temporalidad.","tag":"T7","_type":"vf"},{"text":"El Mecanismo RED creado por la reforma de 2021 sustituye en todos los supuestos a los tradicionales ERTE por causas ETOP y de fuerza mayor.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Mecanismo RED es una figura nueva y adicional, pensada para situaciones macroeconómicas o sectoriales de gran calado. Los ERTE por causas ETOP (económicas, técnicas, organizativas y de producción) y de fuerza mayor se mantienen para situaciones de empresa. El Mecanismo RED tiene dos modalidades: cíclica (máximo 1 año) y sectorial (hasta 1 año con posibles extensiones de 6 meses adicionales).","tag":"T7","_type":"vf"},{"text":"La reforma laboral de 2021 recuperó la ultraactividad indefinida de los convenios colectivos, revertiendo así el límite de un año impuesto por la reforma de 2012.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reforma de 2021 derogó el límite temporal a la ultraactividad establecido en 2012. Con ello, los convenios colectivos vuelven a mantener su vigencia de forma indefinida tras ser denunciados, hasta que se alcance un nuevo acuerdo entre las partes negociadoras.","tag":"T7","_type":"vf"},{"text":"El desempleo estructural en España se explica principalmente por la insuficiencia de la demanda agregada durante las fases de recesión económica.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El desempleo estructural no responde a la falta de demanda agregada (que sería desempleo cíclico), sino a rigideces e imperfecciones en el propio funcionamiento del mercado de trabajo, como la inadecuación de las cualificaciones, los sistemas de negociación colectiva o las regulaciones laborales.","tag":"T7","_type":"vf"},{"text":"La tasa de paro que corresponde a la NAIRU es aquella compatible con una tasa de inflación estable y no acelerada.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La NAIRU (Non-Accelerating Inflation Rate of Unemployment) es la tasa de paro estructural o de 'equilibrio' compatible con una inflación constante y no creciente. Reducir el paro por debajo de la NAIRU mediante estímulo de la demanda genera presiones inflacionistas.","tag":"T7","_type":"vf"},{"text":"Durante los años setenta y ochenta, los salarios reales en España registraron caídas pronunciadas, lo que contribuyó de forma significativa al incremento del desempleo en esa etapa.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Fue precisamente lo contrario. Los salarios reales crecieron por encima de la productividad durante los años setenta y primeros ochenta, lo que encareció relativamente el factor trabajo, desincentivó la contratación y contribuyó al fuerte aumento del desempleo estructural en ese período.","tag":"T7","_type":"vf"},{"text":"La rigidez a la baja de los salarios nominales en España, favorecida por el modelo de negociación colectiva, es uno de los factores que explica la elevada tasa de paro estructural.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El modelo de negociación colectiva sectorial, con la presencia de sindicatos que defienden los intereses de los trabajadores con empleo (insiders), tiende a generar rigideces salariales a la baja. Esto impide el ajuste del mercado de trabajo vía precio (salarios) y lo desplaza hacia el ajuste vía cantidad (empleo), elevando el paro estructural.","tag":"T7","_type":"vf"},{"text":"Los estudios disponibles estiman que la reforma laboral de 2012 contribuyó a elevar el empleo en unos 900.000 puestos de trabajo adicionales respecto a lo que se habría producido sin dicha reforma.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las evaluaciones de la reforma de 2012 estiman que, gracias a la mayor flexibilidad interna introducida (como los ERTE y el 'descuelgue' de convenios), se evitó la destrucción de en torno a 900.000 empleos durante la segunda recesión de 2012-2013, al permitir a las empresas ajustar costes sin recurrir al despido.","tag":"T7","_type":"vf"},{"text":"Los contratos formativos de 'alternancia' y de 'práctica profesional' introducidos por la reforma de 2021 sustituyeron respectivamente al antiguo contrato de formación y aprendizaje y al contrato en prácticas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reforma de 2021 reformuló los contratos formativos. El contrato de formación en alternancia sustituyó al de formación y aprendizaje, combinando trabajo y formación acreditable; y el contrato para la obtención de práctica profesional sustituyó al antiguo contrato en prácticas para los titulados.","tag":"T7","_type":"vf"},{"text":"El contrato fijo-discontinuo, potenciado por la reforma de 2021, se destina a empleos de carácter permanente pero que se desarrollan solo en determinadas épocas del año o de forma intermitente.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El fijo-discontinuo es un contrato indefinido que se activa y suspende según las necesidades productivas recurrentes de la empresa. La reforma de 2021 amplió su ámbito de aplicación, incluyendo sectores como el turismo o la hostelería, para reducir la temporalidad en actividades estacionales.","tag":"T7","_type":"vf"},{"text":"El desempleo friccional surge de los desajustes entre las características del puesto de trabajo ofertado y las del trabajador demandante, como la cualificación o la localización geográfica.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El desempleo que surge de los desajustes de cualificación o localización geográfica es el desempleo estructural (por 'mismatch'). El desempleo friccional, en cambio, es el que se produce por el tiempo que necesariamente transcurre mientras un trabajador busca un nuevo empleo tras dejar uno anterior, siendo un fenómeno transitorio e inevitable en cualquier economía dinámica.","tag":"T7","_type":"vf"},{"text":"La reforma de 2021 establece que los convenios colectivos sectoriales pueden fijar un salario mínimo por debajo del Salario Mínimo Interprofesional (SMI).","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Los convenios sectoriales fijan el suelo salarial para su ámbito que los convenios de empresa no pueden rebajar. Pero en ningún caso ni el convenio sectorial ni el de empresa pueden establecer salarios por debajo del SMI, que actúa como suelo absoluto e indisponible para la negociación colectiva.","tag":"T7","_type":"vf"},{"text":"La reforma de 2012 redujo el porcentaje de la prestación por desempleo reconocido a partir del séptimo mes de percepción.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Entre las medidas de la reforma de 2012 en materia de prestaciones se redujo el porcentaje de la base reguladora aplicable a partir del séptimo mes de percepción de la prestación contributiva por desempleo, pasando del 60% al 50%, con el objetivo de reforzar los incentivos a la búsqueda activa de empleo.","tag":"T7","_type":"vf"},{"text":"El elevado peso de la economía sumergida en España contribuye a inflar la tasa de paro oficial, ya que muchos trabajadores irregulares figuran como desempleados en las estadísticas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Una parte de los trabajadores que aparecen registrados como desempleados en la Encuesta de Población Activa (EPA) pueden estar realizando actividades en la economía informal o irregular. Ello hace que la tasa de paro oficial sobreestime el desempleo real y que España presente tasas superiores a la media europea en parte por este efecto estadístico.","tag":"T7","_type":"vf"},{"text":"El 'descuelgue' de convenio colectivo, regulado en la reforma de 2012, permite a las empresas incumplir las condiciones de trabajo pactadas en un convenio sin requisito ni procedimiento alguno.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El descuelgue o inaplicación de convenio está sujeto a un procedimiento reglado: requiere acuerdo con la representación legal de los trabajadores, debe justificarse en causas económicas, técnicas, organizativas o de producción, y tiene límites temporales. No es una vía libre de incumplimiento, sino un mecanismo de flexibilidad interna tasado.","tag":"T7","_type":"vf"},{"text":"La tasa de temporalidad en España se sitúa históricamente entre las más altas de la Unión Europea, siendo la reforma de 2021 una de las medidas adoptadas para reducirla.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"España ha presentado de forma persistente una de las tasas de temporalidad contractual más elevadas de la UE, superando habitualmente el 25% de los asalariados. La reforma de 2021 tuvo como objetivo central reducir el abuso de la contratación temporal, y los datos posteriores muestran una reducción significativa de dicha tasa.","tag":"T7","_type":"vf"},{"text":"Los estudios sobre la reforma de 2012 estiman que contribuyó a reducir la tasa de paro estructural (NAIRU) en aproximadamente 4 puntos porcentuales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las evaluaciones econométricas disponibles estiman que la mayor flexibilidad introducida por la reforma de 2012, en especial en materia de negociación colectiva y contratación, habría contribuido a reducir la NAIRU española en torno a 4 puntos porcentuales, facilitando que el mercado de trabajo ajuste con mayor rapidez ante perturbaciones.","tag":"T7","_type":"vf"},{"text":"El Mecanismo RED de la reforma de 2021 en su modalidad sectorial puede mantenerse un máximo de un año sin posibilidad de prórroga.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Mecanismo RED en su modalidad sectorial tiene una duración inicial máxima de un año, pero admite hasta dos prórrogas adicionales de seis meses cada una, lo que permite que su vigencia total alcance los dos años. La modalidad cíclica, en cambio, tiene un límite máximo de un año sin prórrogas.","tag":"T7","_type":"vf"},{"text":"Las Cajas de Ahorros son entidades de depósito con ánimo de lucro cuyo excedente se distribuye entre sus accionistas en forma de dividendos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las Cajas de Ahorros son entidades sin ánimo de lucro. A diferencia de los bancos (sociedades anónimas que reparten dividendos entre sus accionistas), las Cajas destinan sus excedentes a la obra social y a la dotación de reservas, sin repartir beneficios entre propietarios privados.","tag":"T8","_type":"vf"},{"text":"Las Cooperativas de Crédito distribuyen sus beneficios entre sus socios cooperativistas, a diferencia de las Cajas de Ahorros que los destinan a obra social.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las Cooperativas de Crédito (entre las que destacan las Cajas Rurales) son entidades de depósito de naturaleza cooperativa que distribuyen sus resultados positivos entre sus socios. Su funcionamiento difiere así tanto de los bancos (reparto entre accionistas) como de las Cajas de Ahorros (obra social).","tag":"T8","_type":"vf"},{"text":"En 2005 existían en España 47 Cajas de Ahorros, mientras que en la actualidad solo permanecen dos como tales: la Caixa d'Estalvis d'Ontinyent y la Caixa Pollença.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El proceso de reestructuración bancaria iniciado con la crisis de 2008 transformó radicalmente el mapa de las Cajas de Ahorros. Las 47 entidades existentes en 2005 se fusionaron y transformaron mayoritariamente en bancos (Caixabank, Unicaja, Ibercaja, Kutxabank, etc.), quedando únicamente dos cajas operando con ese formato original.","tag":"T8","_type":"vf"},{"text":"El proceso de desregulación financiera en España se apoyó en tres pilares: la eliminación de restricciones a los tipos de interés, el desarrollo de los mercados financieros y los avances en las tecnologías de la información.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La liberalización financiera española descansó sobre esas tres columnas: la libertad en la fijación de tipos de interés (eliminando los techos y suelos administrativos), el desarrollo de mercados que ofrecieron a los usuarios alternativas al crédito bancario, y los avances tecnológicos y de telecomunicaciones que redujeron las barreras de entrada al sector.","tag":"T8","_type":"vf"},{"text":"Antes de 1989, las Cajas de Ahorros tenían prohibida su expansión fuera de su territorio de origen, lo que limitaba su ámbito de actuación al ámbito local o regional.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Hasta 1989, la normativa impedía a las Cajas de Ahorros operar fuera de su comunidad autónoma de origen. La eliminación de esa restricción territorial ese año desencadenó una agresiva expansión geográfica de las cajas por todo el territorio nacional, lo que contribuyó al aumento de su peso relativo en el sistema bancario.","tag":"T8","_type":"vf"},{"text":"Los bancos españoles optaron prioritariamente por una estrategia de expansión nacional durante los años noventa y dos mil, mientras que las Cajas de Ahorros protagonizaron la expansión internacional.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Fue exactamente al contrario. Los grandes bancos (Santander y BBVA principalmente) apostaron por una estrategia de expansión internacional, especialmente en Latinoamérica. Las Cajas de Ahorros, liberadas en 1989 para operar en todo el territorio, centraron su crecimiento en la expansión nacional, convirtiéndose en el principal agente del crédito interior hasta 2008.","tag":"T8","_type":"vf"},{"text":"El apalancamiento de las entidades bancarias españolas en los mercados mayoristas internacionales antes de 2008 fue uno de los factores que agravó el impacto de la crisis financiera global sobre el sistema bancario español.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La elevada dependencia de la financiación mayorista internacional (en lugar de depósitos minoristas estables) hizo al sistema muy vulnerable cuando los mercados interbancarios se congelaron tras la quiebra de Lehman Brothers. Las entidades, especialmente las Cajas, vieron cortado su acceso a financiación externa, lo que agravó su crisis de liquidez.","tag":"T8","_type":"vf"},{"text":"El aumento de la morosidad durante la crisis financiera de 2008 afectó de manera especialmente intensa a los créditos concedidos al sector promotor e inmobiliario, perjudicando más a las Cajas que a los bancos.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las Cajas de Ahorros habían concentrado su expansión crediticia en el sector inmobiliario y de la construcción durante el boom. Cuando estalló la burbuja, el desplome del valor de los activos inmobiliarios y el incumplimiento de los promotores elevaron la morosidad de forma dramática, afectando de manera desproporcionada a las Cajas respecto a los bancos.","tag":"T8","_type":"vf"},{"text":"El FROB (Fondo de Reestructuración Ordenada Bancaria) se creó para facilitar los procesos de integración y saneamiento de entidades de crédito con dificultades.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El FROB se creó en 2009 como instrumento del Estado para apoyar financieramente los procesos de reestructuración bancaria. Canalizó fondos hacia las entidades en dificultades (especialmente Cajas) para apoyar sus fusiones, recapitalizaciones y, en última instancia, su conversión en bancos o su resolución ordenada.","tag":"T8","_type":"vf"},{"text":"El Real Decreto-Ley 11/2010 permitió a las Cajas de Ahorros captar capital externo de inversores privados mediante la emisión de cuotas participativas con derechos políticos plenos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El RDL 11/2010 reguló la 'bancarización' de las Cajas, permitiéndoles traspasar su actividad financiera a un banco instrumental. En cuanto a la gobernanza, estableció que si la participación de inversores externos superaba el 10%, la entidad debía transformarse en 'fundación bancaria'; si era inferior, en 'fundación ordinaria'. Las cuotas participativas anteriores ya existían, pero el RDL articuló la vía de la bancarización.","tag":"T8","_type":"vf"},{"text":"El rescate bancario europeo a España, acordado en junio de 2012, contempló una línea de crédito de hasta 100.000 millones de euros para la recapitalización del sector financiero.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El 25 de junio de 2012, el Eurogrupo acordó un rescate financiero para España de hasta 100.000 millones de euros destinado exclusivamente a la recapitalización de las entidades bancarias con problemas de solvencia. La cuantía finalmente utilizada fue significativamente inferior, en torno a 41.000 millones.","tag":"T8","_type":"vf"},{"text":"Como condición del rescate bancario de 2012, las entidades beneficiarias debieron asumir pérdidas los poseedores de instrumentos híbridos de capital (participaciones preferentes y deuda subordinada).","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Una de las condiciones del Memorando de Entendimiento del rescate fue que los tenedores de capital híbrido (participaciones preferentes y deuda subordinada) debían absorber pérdidas antes de que el dinero público pudiera ser inyectado. Esto supuso quitas importantes para muchos ahorradores minoristas que habían adquirido esos productos.","tag":"T8","_type":"vf"},{"text":"La SAREB ('banco malo') fue creada para adquirir y gestionar los activos inmobiliarios tóxicos de las entidades rescatadas, con el objetivo de sanear sus balances.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La Sociedad de Gestión de Activos procedentes de la Reestructuración Bancaria (SAREB) se constituyó en 2012 como condición del rescate bancario. Asumió los activos inmobiliarios y créditos dudosos de las entidades nacionalizadas, con el objetivo de eliminarlos de sus balances y facilitar así su saneamiento y posterior venta o liquidación.","tag":"T8","_type":"vf"},{"text":"Entre 2008 y 2024, el número de sucursales bancarias en España se redujo en aproximadamente 28.000 oficinas y el empleo del sector disminuyó en cerca de 100.000 trabajadores.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reestructuración bancaria supuso un ajuste de capacidad muy significativo. El cierre masivo de sucursales (en torno a 28.000 menos) y la reducción de plantillas (aproximadamente 100.000 empleos menos) son consecuencias directas de las fusiones, absorciones y cambios en el modelo de negocio hacia la digitalización.","tag":"T8","_type":"vf"},{"text":"El ratio de capital de máxima calidad (CET1) del sistema bancario español en 2024 era inferior al registrado antes de la crisis de 2008, lo que evidencia la fragilidad persistente del sector.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ocurre lo contrario. El ratio de capital del sistema bancario español en 2024 se sitúa en torno al 13%, aproximadamente el doble del nivel registrado antes de la crisis. El saneamiento y la reestructuración han reforzado notablemente la solvencia y la resistencia del sector frente a las exigencias regulatorias de Basilea III.","tag":"T8","_type":"vf"},{"text":"La recuperación de la rentabilidad bancaria a partir de 2022 se debe fundamentalmente a las subidas de los tipos de interés por parte del BCE, que amplían el margen de intermediación.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Tras años de tipos de interés en niveles históricamente bajos o incluso negativos que comprimían los márgenes, las fuertes subidas de tipos iniciadas por el BCE en la segunda mitad de 2022 para combatir la inflación incrementaron de forma notable el margen de intermediación bancaria, disparando los beneficios del sector.","tag":"T8","_type":"vf"},{"text":"Durante la pandemia de COVID-19, los ERTEs aplicados en España contribuyeron a evitar el aumento de la morosidad bancaria, al mantener los ingresos de los trabajadores afectados.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Los ERTEs permitieron a las empresas suspender contratos sin despedir a los trabajadores, quienes seguían percibiendo prestaciones. Esto mantuvo la capacidad de pago de los hogares y evitó que la crisis económica de 2020 se tradujera en un fuerte aumento de la morosidad bancaria, a diferencia de lo ocurrido en la crisis de 2008.","tag":"T8","_type":"vf"},{"text":"Las estrategias de expansión internacional de los bancos españoles durante los años noventa se articularon principalmente a través de tres vías: participaciones de capital, acuerdos de colaboración y adquisición de bancos extranjeros.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La internacionalización de los grandes bancos españoles (Santander y BBVA) siguió esas tres modalidades: toma de participaciones accionariales en bancos extranjeros, acuerdos y alianzas estratégicas, y adquisiciones directas de entidades bancarias en los mercados de destino, especialmente en Latinoamérica.","tag":"T8","_type":"vf"},{"text":"El proceso de concentración bancaria en España tras la crisis de 2008 ha generado un sistema con un número de entidades muy superior al previo, favoreciendo la competencia.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El proceso ha sido el opuesto: una intensa concentración que ha reducido drásticamente el número de entidades operativas. Docenas de cajas y bancos medianos desaparecieron o fueron absorbidos, resultando en un sistema más concentrado dominado por un reducido número de grandes grupos bancarios, lo que plantea interrogantes sobre la competencia, no sobre su mejora.","tag":"T8","_type":"vf"},{"text":"La entrada de empresas fintech en el mercado de servicios financieros ha desafiado el modelo de negocio tradicional de la banca, especialmente en pagos, financiación y gestión de inversiones.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las empresas fintech han irrumpido en segmentos clave del negocio bancario tradicional: medios de pago digitales, plataformas de financiación alternativa (crowdfunding, crowdlending), robo-advisors para gestión de inversiones y servicios de cambio de divisas. Esto ha obligado a la banca tradicional a acelerar su transformación digital.","tag":"T8","_type":"vf"},{"text":"El Banco Central Europeo respondió a la crisis del COVID-19 con el programa PEPP (Pandemic Emergency Purchase Programme), dotado con 1,3 billones de euros para compra de activos.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El BCE lanzó el PEPP en marzo de 2020 como respuesta urgente a la pandemia. Con una dotación inicial que alcanzó los 1,85 billones de euros (ampliada progresivamente desde los 750.000 millones iniciales), el programa permitió compras de deuda pública y privada para mantener la liquidez y contener los costes de financiación de los Estados.","tag":"T8","_type":"vf"},{"text":"El impacto de la crisis financiera internacional de 2008 sobre la banca española fue inmediato y directo, dado que las entidades españolas habían invertido masivamente en activos subprime estadounidenses.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El impacto sobre la banca española fue principalmente indirecto. Las entidades españolas tenían una exposición limitada a los activos subprime de EE.UU. El problema se generó por vías propias: el apalancamiento en mercados mayoristas, el boom inmobiliario doméstico y la sobreexposición al crédito promotor e hipotecario nacional, que colapsaron cuando estalló la burbuja.","tag":"T8","_type":"vf"},{"text":"A partir de la crisis de 2008, las Cajas de Ahorros se convirtieron en el principal modelo de entidad de depósito en España, superando en cuota de mercado a los bancos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las Cajas de Ahorros efectivamente llegaron a ser el principal agente crediticio antes de 2008, pero la crisis supuso su práctica desaparición como formato. Mediante bancarización, fusiones y procesos de resolución, la mayoría se transformó en bancos o desapareció, de modo que hoy el sector está dominado por entidades con forma jurídica de banco.","tag":"T8","_type":"vf"},{"text":"La principal consecuencia del rescate bancario de 2012 para las condiciones de las entidades beneficiarias fue la obligación de reducir su red de oficinas y limitar su actividad al territorio de origen.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las condiciones del Memorando de Entendimiento exigieron a las entidades que recibieron ayudas públicas la presentación de planes de reestructuración que incluían la reducción de capacidad instalada (cierre de oficinas y reducción de empleo), la concentración de la actividad en su territorio de referencia y el abandono de la financiación al sector promotor e inmobiliario.","tag":"T8","_type":"vf"},{"text":"La digitalización de los servicios bancarios ha permitido al sector reducir costes operativos, pero ha generado el problema de la exclusión financiera de segmentos de población con menor acceso o capacidad digital.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El cierre masivo de sucursales y la migración de servicios a canales digitales ha reducido costes para las entidades, pero ha creado el problema de la exclusión financiera de colectivos como personas mayores, población rural y otros grupos con menor alfabetización digital, generando un debate sobre la obligación de mantener servicios presenciales básicos.","tag":"T8","_type":"vf"},{"text":"El concepto estricto de Sector Público incluye únicamente a las Administraciones Públicas, excluyendo a las empresas públicas que operan en el mercado.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El concepto estricto de Sector Público se limita a las Administraciones Públicas (AAPP): Administración Central, Seguridad Social, Comunidades Autónomas y Corporaciones Locales. El concepto amplio también incluiría las empresas públicas, pero la perspectiva habitual en el análisis de las finanzas públicas utiliza el concepto estricto.","tag":"T9","_type":"vf"},{"text":"La Seguridad Social española se financia exclusivamente a través de las cotizaciones sociales de trabajadores y empresas, sin recibir transferencias de otros subsectores de las AAPP.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La Seguridad Social se financia principalmente mediante cotizaciones sociales, pero también recibe transferencias significativas del Estado, que complementan su financiación especialmente para cubrir las prestaciones no contributivas y los desequilibrios estructurales entre ingresos por cotizaciones y gastos en pensiones y sanidad.","tag":"T9","_type":"vf"},{"text":"Tras la aprobación de la Constitución de 1978, el proceso de descentralización en España transfirió a las Comunidades Autónomas competencias en materias como agricultura, industria, educación y obras públicas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La Constitución de 1978 abrió el proceso de descentralización territorial. Competencias históricamente centralizadas como la agricultura, la industria, la educación, la cultura y las obras públicas fueron progresivamente transferidas a las Comunidades Autónomas, mientras que la sanidad y los servicios sociales se transfirieron desde la Seguridad Social.","tag":"T9","_type":"vf"},{"text":"En 2024, las Comunidades Autónomas representan aproximadamente el 62% del empleo público total en España, siendo el subsector con mayor peso dentro de las AAPP.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Como consecuencia de las amplias competencias asumidas (especialmente sanidad, educación y servicios sociales), las CCAA concentran la mayor parte del empleo público español. En 2024, su peso supera el 60% del total de empleados públicos, frente al 20% de las Corporaciones Locales y el 18% de la Administración Central.","tag":"T9","_type":"vf"},{"text":"Las empresas públicas estatales tienen un peso muy relevante en la economía española, superando actualmente el 10% del PIB.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El peso de las empresas públicas estatales en España es actualmente residual, en torno al 1,4% del PIB. Entre las principales figuran Renfe, Correos, Loterías del Estado, Adif, Aena, las confederaciones hidrográficas, los puertos del Estado, los astilleros y Paradores de Turismo.","tag":"T9","_type":"vf"},{"text":"El proceso de reforma del marco regulador de la economía española a partir de los años noventa implicó el paso de una regulación de carácter estructural (sobre la estructura del mercado) a una de carácter conductual (sobre el comportamiento de los agentes).","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La integración en la UE y la implementación del Mercado Único impulsaron un cambio en el tipo de intervención regulatoria: de regular directamente la estructura de los mercados (barreras de entrada, precios administrados, monopolios públicos), se pasó a regular el comportamiento de los agentes ya presentes en mercados más abiertos y competitivos.","tag":"T9","_type":"vf"},{"text":"La Comisión Nacional de los Mercados y la Competencia (CNMC) fue creada en 2013 para unificar bajo un único organismo las funciones de regulación sectorial y defensa de la competencia.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La CNMC se creó en 2013 fusionando organismos reguladores sectoriales preexistentes (CMT, CNE, CNC, entre otros) con el objetivo de simplificar la arquitectura regulatoria española y concentrar en un único organismo independiente las funciones de supervisión de la competencia y la regulación de sectores con fallos de mercado.","tag":"T9","_type":"vf"},{"text":"El gasto público en España como porcentaje del PIB supera actualmente la media de la zona euro, lo que evidencia un Estado del Bienestar más desarrollado.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Pese al importante crecimiento del gasto público desde la transición democrática, el ratio gasto/PIB de España (aproximadamente 44,9% en 2024) se sitúa por debajo de la media de la Eurozona (49,4%), lo que indica que el nivel de intervención pública en la economía española es inferior al promedio de sus socios comunitarios.","tag":"T9","_type":"vf"},{"text":"Entre 1995 y 2007, el gasto público como porcentaje del PIB en España experimentó una reducción de aproximadamente 10 puntos porcentuales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Durante la larga fase expansiva que va desde mediados de los noventa hasta 2007, la combinación de fuerte crecimiento económico (que elevaba el PIB denominador) con cierta contención del gasto permitió reducir el ratio de gasto público sobre el PIB en cerca de 10 puntos porcentuales, favoreciendo incluso superávits presupuestarios entre 2005 y 2007.","tag":"T9","_type":"vf"},{"text":"En 2020, como consecuencia de la pandemia del COVID-19, el gasto público en España superó el 50% del PIB por primera vez en la historia reciente.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La combinación del fuerte desplome del PIB (denominador) y el aumento extraordinario del gasto público para hacer frente a la crisis sanitaria y económica (ERTEs, ayudas a empresas, gasto sanitario, prestaciones sociales) elevó el ratio de gasto sobre el PIB hasta el 51,4% en 2020, nivel sin precedentes en la democracia española.","tag":"T9","_type":"vf"},{"text":"Las pensiones representan la mayor partida individual del gasto público español, concentrando en torno a un tercio del total del gasto.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"En 2023, el gasto en pensiones supone aproximadamente el 31,1% del gasto público total en España, convirtiéndose con claridad en la partida de mayor peso. Le siguen en importancia la sanidad (14,5%), la educación (9,3%) y los intereses de la deuda (5,5%).","tag":"T9","_type":"vf"},{"text":"Comparado con la media de la UE-27, España destina proporcionalmente más gasto público a educación y defensa, y menos a pensiones.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La comparativa es la inversa. España destina proporcionalmente más gasto que la media comunitaria a pensiones y prestaciones por desempleo, mientras que gasta relativamente menos que el promedio europeo en defensa, educación, sanidad y otros gastos sociales.","tag":"T9","_type":"vf"},{"text":"La reforma fiscal de los Pactos de la Moncloa de 1977 y la aprobación de la Constitución de 1978 sentaron las bases del moderno sistema tributario español.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Los Pactos de la Moncloa de 1977 y la posterior Constitución de 1978 impulsaron la reforma fiscal que modernizó el sistema tributario español: se creó el IRPF con carácter progresivo, se reformó el Impuesto de Sociedades y se estableció el marco para la posterior introducción del IVA en 1986 con la entrada en la CEE.","tag":"T9","_type":"vf"},{"text":"En España, la presión fiscal (ingresos públicos totales como porcentaje del PIB) se sitúa entre las más elevadas de la Unión Europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Pese al aumento de la presión fiscal desde la transición (de aproximadamente el 21% en 1975 hasta el 41,9% en 2024), España se encuentra entre los países con menor presión fiscal de la UE, significativamente por debajo de países como Francia, Bélgica, Dinamarca o Suecia, que superan el 45-50%.","tag":"T9","_type":"vf"},{"text":"Las cotizaciones sociales representan la mayor fuente de ingresos del sector público español, por delante de los impuestos directos e indirectos.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"En la estructura de ingresos de las AAPP españolas, las cotizaciones sociales (aproximadamente el 31,4% del total) constituyen la partida de mayor peso, seguidas por los impuestos directos (IRPF e Impuesto de Sociedades, con el 30%) y los impuestos indirectos (IVA y otros, con el 26,3%).","tag":"T9","_type":"vf"},{"text":"La comparativa con la UE-27 muestra que España recauda porcentualmente más a través de impuestos directos e indirectos, y menos mediante cotizaciones sociales.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ocurre lo contrario. España tiene una proporción de cotizaciones sociales sobre el total de ingresos superior a la media europea, mientras que su recaudación por impuestos directos (IRPF, Sociedades) e indirectos (IVA) es relativamente inferior como porcentaje del PIB al promedio de la UE-27.","tag":"T9","_type":"vf"},{"text":"España registró superávit presupuestario en los años 2005, 2006 y 2007, gracias al fuerte crecimiento económico de la fase expansiva.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Durante el auge económico del período 2005-2007, los ingresos públicos crecieron de forma extraordinaria (especialmente los vinculados a la actividad inmobiliaria: IVA, transmisiones patrimoniales) mientras se contenía el gasto, lo que permitió registrar superávits presupuestarios históricos hasta entonces infrecuentes en la democracia española.","tag":"T9","_type":"vf"},{"text":"El máximo déficit público en España durante la crisis financiera de 2008 se alcanzó en 2012, coincidiendo con el rescate bancario.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El máximo déficit público se alcanzó en 2009, cuando el saldo negativo llegó al -11% del PIB. El año 2012 registró un déficit del -3,7% del PIB (que incluía el impacto del rescate bancario), significativamente inferior al máximo de 2009, aunque igualmente alejado de los objetivos de estabilidad.","tag":"T9","_type":"vf"},{"text":"El déficit presupuestario español tiene un componente estructural persistente, lo que significa que no desaparece completamente ni en las fases de expansión económica.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"España presenta un déficit estructural (el que persiste una vez eliminado el efecto del ciclo económico) de carácter crónico. Incluso en los años de máximo crecimiento económico (como 2005-2007), el superávit se explica en parte por ingresos fiscales atípicos ligados a la burbuja inmobiliaria, no por una eliminación real del desequilibrio estructural.","tag":"T9","_type":"vf"},{"text":"La deuda pública española alcanzó su máximo histórico en 2020, superando el 119% del PIB, como consecuencia de los extraordinarios gastos relacionados con la pandemia.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La combinación del fuerte aumento del gasto para hacer frente a la pandemia y el desplome del PIB en 2020 elevó la ratio de deuda pública sobre el PIB hasta el 119,3%, el nivel más alto registrado en la historia contemporánea española. Desde entonces, la ratio ha ido reduciéndose gradualmente hasta situarse en torno al 103,5% en 2024.","tag":"T9","_type":"vf"},{"text":"El porcentaje de deuda pública sobre el PIB en España a principios del siglo XXI (en torno a 2007) era superior al 60%, límite establecido en el Pacto de Estabilidad y Crecimiento.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En 2007, justo antes de la crisis, la deuda pública española representaba apenas el 35,6% del PIB, muy por debajo del umbral del 60% del PEC. El enorme mérito de esa situación se explicaba por los años de superávit previos, aunque la deuda privada (especialmente la bancaria y corporativa) era muy elevada.","tag":"T9","_type":"vf"},{"text":"La Administración Central (Estado y organismos autónomos) es el subsector de las AAPP con mayor peso en el gasto público total español, por delante de las CCAA y la Seguridad Social.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En 2023, la Seguridad Social es el mayor subsector de gasto (33,5% del total), seguida muy de cerca por las CCAA (33%). La Administración Central representa el 21,6% y las Corporaciones Locales el 11,9%. Antes de la pandemia la distribución era más favorable a las administraciones territoriales, pero el COVID reforzó el peso de la Administración Central.","tag":"T9","_type":"vf"},{"text":"Aproximadamente dos tercios de la normativa económica vigente en España proviene de directivas y reglamentos de la Unión Europea.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La integración en la UE y el desarrollo del Mercado Único han supuesto una progresiva transferencia de la capacidad normativa en materia económica al nivel europeo. Se estima que alrededor de dos tercios de las normas económicas aplicadas en España tienen su origen en directivas o reglamentos comunitarios, lo que limita el margen de maniobra regulatorio de las AAPP españolas.","tag":"T9","_type":"vf"},{"text":"El Estado del Bienestar en España experimentó su desarrollo principal durante el franquismo, siendo uno de los más consolidados de Europa al iniciarse la transición democrática.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Estado del Bienestar español era muy rudimentario al inicio de la transición democrática. Su desarrollo acelerado se produjo precisamente a partir de la Constitución de 1978 y durante las décadas de los ochenta y noventa, cuando se universalizó la sanidad, se expandió la educación pública y se desarrolló el sistema de protección social, partiendo de niveles muy inferiores a los de los países europeos avanzados.","tag":"T9","_type":"vf"},{"text":"El IVA se introdujo en España en 1986, coincidiendo con la adhesión a la Comunidad Económica Europea, en sustitución del antiguo Impuesto General sobre el Tráfico de Empresas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La adhesión de España a la CEE en 1986 obligó a armonizar el sistema fiscal con el comunitario. El IVA (Impuesto sobre el Valor Añadido) sustituyó al IGTE y se convirtió en el principal impuesto indirecto, siguiendo el modelo ya implantado en los países comunitarios y convirtiéndose en un pilar fundamental de los ingresos del sector público español.","tag":"T9","_type":"vf"},{"text":"Los estabilizadores automáticos del presupuesto público actúan ampliando el déficit en las fases recesivas (por aumento del gasto en desempleo y caída de ingresos) y reduciéndolo en las expansivas, sin necesidad de decisiones discrecionales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Los estabilizadores automáticos son mecanismos fiscales que operan sin intervención deliberada del gobierno: en recesión, el gasto en prestaciones de desempleo aumenta y los ingresos fiscales caen (ampliando el déficit y sosteniendo la demanda); en expansión, ocurre lo contrario. Su existencia es una de las razones por las que el gasto público como porcentaje del PIB fluctúa cíclicamente.","tag":"T9","_type":"vf"},{"text":"La deuda pública española se financia exclusivamente a través de la emisión de bonos del Estado a largo plazo, sin recurrir a instrumentos de corto plazo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Tesoro Público español dispone de una variada gama de instrumentos de financiación según su plazo: a corto plazo emite Letras del Tesoro y Pagarés del Tesoro; a medio y largo plazo emite Bonos del Estado (2 a 5 años) y Obligaciones del Estado (más de 5 años). La diversificación de plazos busca optimizar el coste de la deuda y gestionar el riesgo de refinanciación.","tag":"T9","_type":"vf"}];
const TEST_DATA = [{"text":"Durante el periodo 1961-2024, ¿cómo se comporta el crecimiento del PIB per cápita real de España en relación con los países de la Eurozona?","options":["España crece a un ritmo similar al de la Eurozona tanto en expansiones como en crisis, mostrando una convergencia plena en sus ciclos económicos.","España tiende a crecer a un ritmo mayor que la Eurozona en etapas de expansión, pero sufre fluctuaciones más marcadas y padece las crisis con mayor intensidad.","España tiende a crecer más lentamente que la Eurozona en expansiones, pero se recupera antes gracias a su mayor flexibilidad estructural.","España crece a un ritmo mayor que la Eurozona en todas las fases del ciclo, incluidas las recesiones, debido a su elevada capacidad exportadora."],"correct":1,"razonamiento":"Entre 1961 y 2024, la economía española ha incrementado su PIB per cápita en un 2,4% de media anual, frente al 2,0% de la Eurozona. Sin embargo, ha sufrido con mayor intensidad las crisis económicas y las fluctuaciones del PIB han tenido un carácter más marcado en todas las etapas.","tag":"Tema 1","_type":"test"},{"text":"¿En qué consiste la denominada 'regla del 4%' referida a la evolución del saldo exterior español desde 1960 hasta la actualidad?","options":["Hace referencia al objetivo de crecimiento anual del PIB del 4% fijado en los Pactos de la Moncloa como condición para la integración en la CEE.","Alude a la regla del Pacto de Estabilidad que limitaba el déficit público al 4% del PIB en los países candidatos a la tercera fase de la UEM.","Se refiere al límite no oficial de déficit comercial respecto al PIB que históricamente obligaba a España a devaluar la peseta, restricción que desapareció al entrar en la UEM.","Describe el porcentaje de reservas de divisas que el Banco de España debía mantener para garantizar la estabilidad del tipo de cambio de la peseta."],"correct":2,"razonamiento":"Al entrar en la Unión Económica y Monetaria, la economía española pudo soportar déficits comerciales superiores al 4% del PIB sin necesidad de devaluar su moneda, siempre que pudiera encontrar financiación en los mercados de capitales.","tag":"Tema 1","_type":"test"},{"text":"¿Cómo se ha comportado el saldo exterior de España respecto al PIB entre 1961 y 2024 según el ciclo económico?","options":["El saldo exterior ha sido recurrentemente negativo durante las fases de fuerte expansión económica, logrando ser positivo únicamente durante y tras las crisis, especialmente de forma continuada a partir de 2012.","El saldo exterior ha sido estructuralmente positivo durante las fases de expansión, deteriorándose únicamente en las recesiones por la caída de las exportaciones.","El saldo exterior se ha mantenido en equilibrio a lo largo del periodo, con pequeñas oscilaciones que no muestran un patrón cíclico definido.","El saldo exterior ha mostrado una tendencia positiva creciente desde los años sesenta, con breves episodios de déficit coincidentes solo con las crisis del petróleo."],"correct":0,"razonamiento":"Históricamente el desequilibrio de la balanza generó déficits que se agravaban en épocas de fuerte demanda interna. Con la crisis financiera, el hundimiento de la demanda interna obligó a las empresas a buscar mercados exteriores, lo que se tradujo en superávit a partir de 2012.","tag":"Tema 1","_type":"test"},{"text":"En el periodo 1960-2024, ¿a partir de qué momento se incrementó considerablemente el déficit exterior en relación al PIB y por qué razones?","options":["A partir de la crisis del petróleo de 1973, cuando la factura energética disparó las importaciones hasta representar el 10% del PIB por vez primera en la historia española.","A partir de la segunda mitad de los años noventa (fase 1995-2007), alcanzando hasta un 10% del PIB en 2007, por la fuerte demanda interna, la inflación diferencial, la escasa productividad y la competencia de economías emergentes.","Desde la adhesión a la CEE en 1986, cuando la apertura comercial generó un déficit inmediato que llegó a superar el 8% del PIB en plena fase de adaptación al mercado único.","A raíz de la crisis de 1992-1993, cuando la devaluación de la peseta encareció las importaciones y amplió el déficit exterior hasta niveles históricamente insostenibles."],"correct":1,"razonamiento":"El deterioro acelerado hacia el 10% del PIB en 2007 estuvo influido por la fortaleza de la demanda interna (que estimuló más importaciones), una inflación diferencial superior en 1,5 puntos, una reducida productividad y una elevada competencia exterior por parte de economías emergentes.","tag":"Tema 1","_type":"test"},{"text":"¿Por qué el PIB per cápita de España es inferior respecto a la Eurozona que frente a la UE-27? ¿Ha habido convergencia desde los años 60?","options":["Es inferior frente a la UE-27 porque esta incluye economías emergentes de Europa oriental que elevan la media, mientras que la Eurozona agrupa solo países de renta similar a España.","Es inferior frente a ambas zonas en la misma proporción, sin diferencia significativa entre el PIB per cápita relativo frente a la Eurozona y frente a la UE-27.","Es inferior frente a la Eurozona exclusivamente por el efecto del tipo de cambio; en paridad de poder adquisitivo España se sitúa por encima de la media comunitaria.","Es inferior frente a la Eurozona porque esta concentra las economías más avanzadas, mientras que la UE-27 incluye países de reciente integración con rentas menores. Sí ha existido convergencia general desde 1961 respecto a ambas zonas."],"correct":3,"razonamiento":"El PIB per cápita español se situó en 2024 en un 86,7% frente a la media de la Eurozona, pero alcanzó un 90,0% respecto a la UE-27. A largo plazo se constata la convergencia, pasando desde niveles cercanos al 70% a principios de los años 60, con periodos de acercamiento y alejamiento marcados por las crisis.","tag":"Tema 1","_type":"test"},{"text":"Sobre los rasgos del crecimiento económico español entre 1960 y 2024: ¿cuál de las siguientes combinaciones de afirmaciones (Verdadero/Falso) es correcta? 1) Los países europeos crecieron más que España. 2) España participó intensamente en relaciones económicas con su entorno antes de pertenecer a la UE. 3) España destruye menos empleo que los países europeos durante las crisis. 4) España sufrió fluctuaciones más intensas del PIB que los países europeos en las etapas de crisis.","options":["1) Falso. 2) Verdadero. 3) Falso. 4) Verdadero.","1) Verdadero. 2) Verdadero. 3) Falso. 4) Verdadero.","1) Falso. 2) Verdadero. 3) Verdadero. 4) Verdadero.","1) Falso. 2) Falso. 3) Falso. 4) Verdadero."],"correct":0,"razonamiento":"Los países europeos crecieron a menor ritmo (2,0% Eurozona frente al 2,4% de España). España participó intensamente con su entorno europeo antes de ingresar en la UE. España no destruye menos empleo: ha sufrido con mayor intensidad las crisis económicas. Las fluctuaciones del PIB en España han tenido un carácter más marcado que los países comunitarios en todas las etapas.","tag":"Tema 1","_type":"test"},{"text":"Respecto a los años 80 hasta el Tratado de Maastricht de 1992, ¿cuál de las siguientes combinaciones de verdadero/falso sobre las afirmaciones señaladas es correcta? [Empresas públicas saneadas / Mercado laboral sin rigidez / Objetivos 1982 ya sin inflación ni déficit / Expansión 86-91 por demanda externa / Inflación dual: bienes mayor que servicios / Apreciación de la peseta mejoró competitividad]","options":["Empresas públicas saneadas: Verdadero / Mercado sin rigidez: Falso / Expansión 86-91 por demanda externa: Falso / Inflación dual bienes > servicios: Falso / Peseta apreciada mejora competitividad: Falso.","Empresas públicas saneadas: Falso / Mercado sin rigidez: Verdadero / Expansión 86-91 por demanda externa: Falso / Inflación dual bienes > servicios: Falso / Peseta apreciada mejora competitividad: Falso.","Empresas públicas saneadas: Falso / Mercado sin rigidez: Falso / Expansión 86-91 por demanda externa: Falso / Inflación dual bienes > servicios: Falso / Peseta apreciada mejora competitividad: Falso.","Empresas públicas saneadas: Falso / Mercado sin rigidez: Falso / Expansión 86-91 por demanda externa: Verdadero / Inflación dual bienes > servicios: Falso / Peseta apreciada mejora competitividad: Falso."],"correct":2,"razonamiento":"Las empresas públicas sufrían déficits (no estaban saneadas). El mercado laboral presentaba rigideces. En 1982 la inflación y el déficit aún eran objetivos a reducir. La expansión 86-91 se debió a la demanda interna, no externa. La inflación dual indica que los servicios crecían MÁS que los bienes (no al revés). La apreciación de la peseta REDUJO la competitividad exterior.","tag":"Tema 1","_type":"test"},{"text":"En la segunda fase de la UEM, que comenzó el 1 de enero de 1994, ¿podían los bancos centrales nacionales conceder préstamos al sector público?","options":["Sí, pero únicamente con la autorización previa del Consejo de Ministros y por un importe no superior al 3% del PIB del país correspondiente.","Sí, podían hacerlo en circunstancias excepcionales de emergencia fiscal, previa consulta con el Instituto Monetario Europeo.","Sí, pero solo para cubrir déficits presupuestarios transitorios y a tipos de interés de mercado, como medida de transición hacia la tercera fase.","No, estaba estrictamente prohibido que los bancos centrales nacionales concedieran préstamos al sector público."],"correct":3,"razonamiento":"Con la entrada en vigor de la Segunda Fase de la UEM el 1 de enero de 1994, se estableció la prohibición expresa a los bancos centrales de conceder crédito al sector público, como requisito preparatorio para la unificación monetaria.","tag":"Tema 1","_type":"test"},{"text":"¿Para qué se exigía en la segunda fase de la UEM que los bancos centrales fueran independientes?","options":["Para garantizar que la política monetaria nacional pudiera seguir siendo autónoma una vez adoptado el euro, preservando un margen de maniobra nacional.","Era un requisito preparatorio fundamental: los bancos centrales debían iniciar el proceso hacia su independencia para que este concluyera antes del establecimiento del SEBC en la tercera fase.","Era una condición impuesta por los mercados financieros como garantía de la solvencia de los estados antes de emitir bonos en los mercados europeos.","Se requería para coordinar las políticas fiscales nacionales y evitar que los gobiernos usaran la inflación como mecanismo encubierto de redistribución de renta."],"correct":1,"razonamiento":"Se exigía iniciar el proceso conducente a la independencia de los bancos centrales nacionales para que este concluyera antes del establecimiento del Sistema Europeo de Bancos Centrales en la tercera fase de la UEM.","tag":"Tema 1","_type":"test"},{"text":"¿Qué es el Mecanismo de Tipos de Cambio europeo MTC II?","options":["Es un mecanismo regulador del tipo de cambio europeo vinculado a la instauración del euro, en vigor desde el inicio de la Tercera Fase de la UEM (1 de enero de 1999).","Es el sistema de supervisión bancaria europea creado tras la crisis financiera de 2008 para coordinar la regulación prudencial de las entidades de crédito de la zona euro.","Es el mecanismo de financiación de emergencia del BCE para estados con dificultades de acceso a los mercados de deuda, activado por primera vez en la crisis griega de 2010.","Es el marco de estabilidad presupuestaria que establece los límites de déficit y deuda para los países candidatos a adoptar el euro."],"correct":0,"razonamiento":"El Mecanismo de Tipos de Cambio II (MTC II) entró en vigor durante la Tercera Fase de la UEM, iniciada el 1 de enero de 1999, vinculando los tipos de cambio de las monedas de países que aún no habían adoptado el euro al euro mismo.","tag":"Tema 1","_type":"test"},{"text":"¿Qué es el Pacto de Estabilidad y Crecimiento?","options":["Es el acuerdo intergubernamental firmado en 1991 por el que los estados se comprometían a alcanzar una inflación inferior al 2% antes de adoptar la moneda única.","Es el fondo de rescate permanente de la eurozona creado en 2012 para financiar a los estados con dificultades de pago, con una capacidad máxima de 700.000 millones de euros.","Es una normativa de rigor fiscal europeo a la que quedan sujetos los estados miembros, en vigor desde la Tercera Fase de la UEM (1999), que obliga al control del déficit público.","Es el tratado por el que los estados cedieron la soberanía monetaria al BCE a cambio de beneficiarse de los tipos de interés bajos propios de las economías más estables de la zona."],"correct":2,"razonamiento":"El Pacto de Estabilidad y Crecimiento entró en vigor en la Tercera Fase de la UEM (1999) para forzar el control del déficit público, y en España dio lugar a la posterior Ley General de Estabilidad Presupuestaria de 2002.","tag":"Tema 1","_type":"test"},{"text":"Para acceder a la tercera fase de la UEM, ¿qué se exigía a los países miembros?","options":["Se exigía exclusivamente el criterio de déficit público (inferior al 3% del PIB) y el de deuda (inferior al 60% del PIB); los criterios monetarios eran orientativos y no vinculantes.","Se exigía el cumplimiento de cinco criterios: inflación (no superar en 1,5 pp la media de los tres países más estables), tipos de interés (no superar en 2 pp), déficit público máximo del 3%, deuda pública máxima del 60%, y estabilidad del tipo de cambio en el SME.","Se exigía demostrar un crecimiento real del PIB superior al 2% anual durante al menos tres años consecutivos y una tasa de desempleo inferior a la media comunitaria.","Se exigía únicamente el criterio de inflación (inferior al 3%) y la participación voluntaria durante dos años en el mecanismo de tipos de cambio del Sistema Monetario Europeo."],"correct":1,"razonamiento":"Se requería cumplir cinco criterios macroeconómicos: tasa de inflación (no superar en más de 1,5 pp la media de los tres países más estables), tipos de interés (no superar en 2 pp), déficit público máximo del 3% del PIB, deuda pública máxima del 60% del PIB, y estabilidad del tipo de cambio en el SME.","tag":"Tema 1","_type":"test"},{"text":"Al final de 1998, ¿cumplía España todos los requisitos de convergencia nominal exigidos para acceder a la tercera fase de la UEM?","options":["España cumplía todos los criterios de convergencia sin excepción, incluyendo la deuda pública que se situaba exactamente en el límite del 60% del PIB.","España no cumplía los criterios de inflación ni de tipos de interés, siendo estos los principales obstáculos que requirieron una prórroga especial.","España cumplía los criterios de inflación y deuda pública, pero no el de déficit público, que superaba el 3% del PIB por el impacto del gasto en infraestructuras.","Cumplía casi todos los criterios salvo el de Deuda Pública (67,4% del PIB, por encima del 60% exigido), aunque se consideró que evolucionaba en la dirección correcta y se le permitió adherirse."],"correct":3,"razonamiento":"En 1998 España cumplía los requisitos de Inflación (1,4%), Tipos de Interés (4,0%) y Déficit Público (1,8%), pero no cumplía el requisito de Deuda Pública, que se situaba en el 67,4% del PIB (por encima del 60% exigido).","tag":"Tema 1","_type":"test"},{"text":"¿Por qué se produjo el colapso del SME entre 1992 y 1993?","options":["Se produjo por la combinación de los desequilibrios internos acumulados por los países europeos y el shock externo de la reunificación alemana, que obligó a Alemania a subir los tipos de interés, afectando al resto de monedas del SME.","Se debió exclusivamente a los ataques especulativos de los mercados financieros contra las monedas más débiles, sin que existieran desequilibrios económicos reales de fondo.","Fue consecuencia directa del aumento del precio del petróleo tras la Guerra del Golfo, que generó presiones inflacionistas divergentes haciendo inviable mantener las paridades fijas.","Obedeció a la decisión política de Dinamarca y el Reino Unido de no ratificar el Tratado de Maastricht, lo que generó una crisis de confianza que se extendió a todas las monedas del SME."],"correct":0,"razonamiento":"Se produjo por los desequilibrios internos acumulados de los países europeos sumados a las consecuencias financieras de la reunificación alemana. Los altos tipos de interés fijados por Alemania para financiar su reunificación presionaron al resto de monedas del SME.","tag":"Tema 1","_type":"test"},{"text":"Durante la crisis de 1992-1994, ¿cómo afectó la elevación de los tipos de interés en Alemania a la economía española?","options":["Permitió a España beneficiarse de una entrada masiva de capitales atraídos por los altos tipos de interés españoles, lo que fortaleció la peseta y evitó la recesión.","Generó un efecto neutro sobre España al estar la peseta suficientemente desvinculada del marco alemán gracias a las bandas amplias de fluctuación del SME.","Provocó graves presiones sobre la peseta, la huida masiva de capitales y tres devaluaciones sucesivas que sumaron en torno a un 20% en total entre 1992 y 1995.","Impulsó una apreciación de la peseta que abarató las importaciones y redujo la inflación española, aunque a costa de empeorar la competitividad de las exportaciones."],"correct":2,"razonamiento":"Los altos tipos en Alemania para financiar su reunificación colapsaron el SME. Esto produjo en España una huida de capitales y obligó a que la peseta (antes apreciada) sufriera tres fuertes devaluaciones que sumaron alrededor del 20% en total entre 1992 y 1995.","tag":"Tema 1","_type":"test"},{"text":"En la crisis de 1992-1994, ¿cuál de las siguientes combinaciones describe correctamente lo ocurrido? [PIB sin llegar a negativo / Apreciación del tipo de cambio / Caída de la FBK / Aumento de desempleo, inflación y déficit público / Déficit exterior]","options":["PIB no llegó a negativo: Verdadero / Apreciación: Verdadero / Caída FBK: Verdadero / Desempleo+inflación+déficit: Verdadero / Déficit exterior: Verdadero.","PIB no llegó a negativo: Falso (sí fue negativo) / Apreciación: Falso (hubo depreciación) / Caída FBK: Verdadero / Desempleo+inflación+déficit: Verdadero / Déficit exterior: Verdadero.","PIB no llegó a negativo: Falso (sí fue negativo) / Apreciación: Falso / Caída FBK: Verdadero / Desempleo e inflación: Verdadero pero déficit público: Falso / Superávit exterior: Verdadero.","PIB no llegó a negativo: Falso (sí fue negativo) / Apreciación: Falso / FBK estable: Verdadero / Aumento desempleo pero reducción inflación: Verdadero / Equilibrio exterior: Verdadero."],"correct":1,"razonamiento":"El PIB sí alcanzó tasas negativas. No hubo apreciación sino fuerte depreciación de la peseta. Se produjo una débil demanda interna y caída de la inversión en capital fijo (FBK). Se experimentó un severo aumento del desempleo, inflación superior al 5% y déficit público por encima del 7% del PIB, así como déficit en la Balanza por cuenta corriente.","tag":"Tema 1","_type":"test"},{"text":"A partir del año 2000, con la creación de la zona Euro, ¿se produjo un cambio en los instrumentos tradicionales de política económica?","options":["Sí: la política monetaria y de tipo de cambio pasaron a ser responsabilidad del BCE, y la política fiscal, aunque nacional, debía respetar las reglas del Tratado de la UE, con mayor protagonismo de las reformas estructurales.","No: los estados mantuvieron plena soberanía sobre sus políticas monetaria y fiscal, cediendo al BCE únicamente la supervisión bancaria sin competencias en política monetaria.","Sí, pero el principal cambio fue la transferencia de la política fiscal a la Comisión Europea, que pasó a elaborar los presupuestos nacionales bajo supervisión del Consejo.","No, el cambio fue gradual y los estados conservaron la posibilidad de fijar sus propios tipos de interés en situaciones de emergencia."],"correct":0,"razonamiento":"La política monetaria y de tipo de cambio pasaron a ser responsabilidad del BCE. La política fiscal, aunque nacional, pasó a deber respetar las reglas del tratado de la UE, dando mayor protagonismo a la consolidación fiscal y las reformas estructurales para garantizar la convergencia.","tag":"Tema 1","_type":"test"},{"text":"¿Cuáles fueron los factores expansivos durante el periodo de crecimiento económico 1995-2007?","options":["El crecimiento se basó fundamentalmente en el dinamismo exportador, que aprovechó la competitividad ganada con la depreciación previa de la peseta y la apertura del mercado único europeo.","Los factores expansivos fueron principalmente la entrada de fondos europeos FEDER y FEOGA y una política fiscal expansiva de aumento sostenido del gasto público.","El crecimiento se sustentó en los avances de productividad de los sectores industrial y tecnológico, que permitieron especializarse en productos de alto valor añadido.","Los principales factores fueron la masiva creación de empleo (7,84 millones), el fuerte aumento del consumo interno impulsado por la mejora de renta y riqueza, y el intenso crecimiento de la inversión en capital fijo (FBK) alimentada por la burbuja inmobiliaria y la inversión en equipo e infraestructuras."],"correct":3,"razonamiento":"Los principales factores expansivos fueron: la masiva creación de empleo (7,84 millones), impulsada por reformas, moderación salarial y bajadas de tipos; el incremento del consumo por mejora de renta y de la riqueza financiera e inmobiliaria; y el fuerte incremento de la Inversión (FBK) alimentada por la burbuja inmobiliaria, bienes de equipo e infraestructuras.","tag":"Tema 1","_type":"test"},{"text":"Aunque el periodo 1995-2007 fue expansivo, ¿qué factores ayudaron a contraer el crecimiento?","options":["Los principales frenos fueron la caída del consumo privado por el encarecimiento del crédito hipotecario y la reducción de la inversión empresarial ante el aumento de los tipos del BCE.","La contracción vino impuesta por las restricciones a la inmigración que limitaron el crecimiento de la fuerza laboral y por los elevados costes energéticos del petróleo.","Actua
