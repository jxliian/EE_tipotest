<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EE · Tipo Test</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent-hover: #574fd6;
      --correct: #22c55e;
      --wrong: #ef4444;
      --text: #e2e8f0;
      --text-muted: #7c8db5;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .header-stats { font-size: 0.8rem; color: var(--text-muted); }
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab { padding: 12px 20px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }
    main { flex: 1; padding: 24px; max-width: 860px; width: 100%; margin: 0 auto; }
    #panel-test { display: none; flex-direction: column; gap: 20px; }
    #panel-test.active { display: flex; }
    #panel-banco { display: none; flex-direction: column; gap: 20px; }
    #panel-banco.active { display: flex; }

    /* MODE CARDS */
    #mode-select-view { display: flex; flex-direction: column; gap: 20px; }
    .mode-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .mode-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 32px 20px; cursor: pointer; text-align: center; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 12px; user-select: none; }
    .mode-card:hover { border-color: var(--accent); background: #1e1c35; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(108,99,255,0.15); }
    .mode-card-icon { width: 60px; height: 60px; border-radius: 14px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .mode-card-title { font-size: 1rem; font-weight: 700; }
    .mode-card-count { font-size: 0.82rem; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 3px 12px; }
    @media (max-width: 580px) {
      .mode-cards { grid-template-columns: 1fr; }
      .mode-card { flex-direction: row; text-align: left; padding: 20px; }
      .mode-card-icon { flex-shrink: 0; }
    }

    /* CONTROLS */
    .test-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }
    .btn { padding: 10px 18px; border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: #3b1e1e; color: var(--wrong); border: 1px solid #5a2020; }
    .btn-danger:hover { background: #4f2020; }

    /* PROGRESS */
    .progress-bar-wrap { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; }

    /* QUESTION */
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .question-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--text-muted); }
    .question-text { font-size: 1.05rem; line-height: 1.6; font-weight: 500; }
    .options-grid { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: left; cursor: pointer; color: var(--text); font-size: 0.9rem; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #252040; }
    .option-btn.correct { border-color: var(--correct); background: #0f2a1a; color: var(--correct); }
    .option-btn.wrong { border-color: var(--wrong); background: #2a0f0f; color: var(--wrong); }
    .option-letter { min-width: 26px; height: 26px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .option-btn.correct .option-letter { background: var(--correct); color: #fff; }
    .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }
    .feedback-box { border-radius: 10px; padding: 14px 16px; font-size: 0.88rem; line-height: 1.6; display: none; white-space: pre-wrap; }
    .feedback-box.show { display: block; }
    .feedback-box.correct-fb { background: #0f2a1a; border: 1px solid var(--correct); color: #86efac; }
    .feedback-box.wrong-fb { background: #2a0f0f; border: 1px solid var(--wrong); color: #fca5a5; }
    .nav-btns { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; }

    /* SEARCH */
    .search-results { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .search-result-item { padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; font-size: 0.88rem; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--surface2); }
    .search-result-item .result-num { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 4px; }

    /* SCORE */
    .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: center; display: none; flex-direction: column; gap: 16px; }
    .score-card.show { display: flex; }
    .score-num { font-size: 3rem; font-weight: 800; color: var(--accent); }
    .score-detail { color: var(--text-muted); font-size: 0.9rem; }

    /* BANCO */
    .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .add-form h3 { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    textarea, input[type="text"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none; resize: vertical; width: 100%; transition: border-color 0.2s; }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
    textarea::placeholder, input::placeholder { color: var(--text-muted); }
    .options-inputs { display: flex; flex-direction: column; gap: 8px; }
    .option-input-row { display: flex; align-items: center; gap: 8px; }
    .option-input-row label { min-width: 26px; height: 26px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; cursor: pointer; }
    .option-input-row input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .correct-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: -4px; }
    .question-list { display: flex; flex-direction: column; gap: 8px; }
    .question-list-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .q-info { flex: 1; min-width: 0; }
    .q-num { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
    .q-text { font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 0.9rem; }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* BADGES */
    .tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; color: var(--text-muted); }
    .badge { background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 7px; font-size: 0.72rem; font-weight: 700; margin-left: 6px; }
    .type-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; margin-left: 4px; }
    .type-badge.vf { background: #0f2a1a; color: var(--correct); border: 1px solid var(--correct); }
    .type-badge.test { background: #1a1a35; color: var(--accent); border: 1px solid var(--accent); }
    .type-badge.manual { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    /* TOAST */
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 999; max-width: 300px; }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 500px) { main { padding: 16px; } .question-card { padding: 16px; } }
  </style>
</head>
<body>

<header>
  <h1>EE · Tipo Test</h1>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="test">Examen</div>
  <div class="tab" data-tab="banco">Banco de preguntas</div>
</div>

<main>
  <!-- PANEL EXAMEN -->
  <div id="panel-test" class="active">

    <div id="mode-select-view">
      <div class="mode-cards">
        <div class="mode-card" data-mode="vf">
          <div class="mode-card-icon">V/F</div>
          <div class="mode-card-title">Verdadero / Falso</div>
          <div class="mode-card-count" id="count-vf"></div>
        </div>
        <div class="mode-card" data-mode="test">
          <div class="mode-card-icon">①②③</div>
          <div class="mode-card-title">Tipo Test</div>
          <div class="mode-card-count" id="count-test"></div>
        </div>
        <div class="mode-card" data-mode="mix">
          <div class="mode-card-icon">⇄</div>
          <div class="mode-card-title">Mezcla</div>
          <div class="mode-card-count" id="count-mix"></div>
        </div>
      </div>
      <input class="search-box" id="search-input" type="text" placeholder="Buscar en todas las preguntas..." />
      <div id="search-results" class="search-results" style="display:none;"></div>
    </div>

    <div id="test-active-controls" style="display:none;">
      <div class="test-controls">
        <button class="btn btn-ghost" id="btn-back-mode">← Cambiar modo</button>
        <button class="btn btn-ghost" id="btn-shuffle">⇄ Mezclar</button>
      </div>
    </div>

    <div id="progress-wrap" style="display:none;">
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;">
        <span id="progress-label">Pregunta 1 de N</span>
        <span id="score-inline">✓ 0 &nbsp; ✗ 0</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>

    <div class="question-card" id="question-card" style="display:none;">
      <div class="question-meta">
        <span id="q-tag" class="tag"></span>
        <span id="q-id-label" style="font-size:0.75rem;color:var(--text-muted);"></span>
      </div>
      <div class="question-text" id="question-text"></div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <div class="nav-btns">
        <button class="btn btn-ghost" id="btn-prev">← Anterior</button>
        <button class="btn btn-primary" id="btn-next" disabled>Siguiente →</button>
      </div>
    </div>

    <div class="score-card" id="score-card">
      <div style="font-size:1.4rem;font-weight:700;">Resultado final</div>
      <div class="score-num" id="score-num">0%</div>
      <div class="score-detail" id="score-detail"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
        <button class="btn btn-primary" id="btn-retry">↺ Repetir test</button>
        <button class="btn btn-ghost" id="btn-retry-wrong">Repetir falladas</button>
        <button class="btn btn-ghost" id="btn-back-mode-score">← Cambiar modo</button>
      </div>
    </div>
  </div>

  <!-- PANEL BANCO -->
  <div id="panel-banco">
    <div class="add-form">
      <h3>Añadir pregunta personalizada</h3>
      <textarea id="new-question" rows="3" placeholder="Enunciado de la pregunta..."></textarea>
      <div class="options-inputs" id="options-inputs"></div>
      <div class="correct-hint">Marca el radio button de la opción correcta</div>
      <input type="text" id="new-tag" placeholder="Etiqueta / tema (opcional)" />
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-add">+ Añadir pregunta</button>
        <button class="btn btn-ghost" id="btn-import">↑ Importar JSON</button>
        <button class="btn btn-ghost" id="btn-export">↓ Exportar JSON</button>
        <button class="btn btn-danger" id="btn-clear-manual">Borrar manuales</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none;" />
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <div style="font-size:0.88rem;color:var(--text-muted);">Total cargadas <span class="badge" id="banco-count">0</span></div>
      <input class="search-box" style="max-width:260px;" id="banco-search" type="text" placeholder="Filtrar lista..." />
    </div>
    <div class="question-list" id="question-list"></div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── DATOS EMBEBIDOS ───────────────────────────────────────────────────────────
const VF_DATA   = [{"text":"El crecimiento de la renta per cápita en España generalmente no está acompañado de cambios en la estructura productiva.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El crecimiento económico a largo plazo suele implicar importantes cambios estructurales, como el fuerte descenso del peso de la agricultura en favor de la industria y, posteriormente, de los servicios.","tag":"T2","_type":"vf"},{"text":"En las primeras fases de industrialización, la productividad del trabajo tiende a ser menor en la industria y los servicios que en la agricultura.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Suele ocurrir lo contrario; la productividad es mayor en la industria y servicios, lo que incentiva el trasvase de mano de obra desde el sector primario hacia estos.","tag":"T2","_type":"vf"},{"text":"A finales de los años noventa, el nivel de exposición de la economía española a la competencia exterior era significativamente inferior al de las economías europeas más avanzadas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Para finales de los años noventa, España ya estaba fuertemente integrada en la UE y en el mercado único, alcanzando niveles de apertura y exposición a la competencia exterior muy similares a la media de la Europa avanzada.","tag":"T2","_type":"vf"},{"text":"Una mayor competencia externa y la liberalización de los mercados interiores en España contribuyeron a un menor crecimiento económico.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La competencia externa y la liberalización incentivaron mejoras en la eficiencia, contribuyendo positivamente a la expansión y modernización de la economía.","tag":"T2","_type":"vf"},{"text":"El aumento de las exportaciones generalmente disminuye el tamaño y la productividad de las empresas exportadoras.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Generalmente sucede lo opuesto: la exposición a los mercados internacionales exige mayor competitividad, lo que promueve economías de escala (mayor tamaño) y mejoras de productividad en las empresas.","tag":"T2","_type":"vf"},{"text":"En 1960, la agricultura y la pesca representaban un porcentaje menor del empleo en España que en Alemania.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En 1960, la agricultura representaba el 38,7% del empleo en España, una cifra notablemente superior al 14,0% que representaba en Alemania.","tag":"T2","_type":"vf"},{"text":"En 2021, el sector servicios empleaba a la mayoría de la población activa tanto en España como en Francia.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las economías están fuertemente terciarizadas; los datos recientes sitúan al sector servicios como responsable de alrededor del 80% del empleo en ambos países (78,2% en España y 80,9% en Francia en 2023).","tag":"T2","_type":"vf"},{"text":"La ampliación de los recursos públicos en España no ha tenido un impacto significativo en la productividad del sector privado.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La inversión pública en infraestructuras y equipamientos (Capital Directamente Productivo del sector público) ha sido crucial para proveer servicios que elevan la productividad del sector privado.","tag":"T2","_type":"vf"},{"text":"Las transferencias como las pensiones y el desempleo son una parte del gasto público que estimula el consumo.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Estas transferencias suponen redistribución hacia rentas con alta propensión marginal al consumo, estimulando directamente la demanda agregada.","tag":"T2","_type":"vf"},{"text":"En las dos últimas décadas, España ha experimentado un avance significativo hacia una mayor equidad en la distribución de la renta y ha alcanzado una completa convergencia con las principales economías europeas en este aspecto.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"España ha mantenido tradicionalmente niveles de desigualdad en la distribución de la renta superiores a la media de la Unión Europea.","tag":"T2","_type":"vf"},{"text":"Una mayor equidad en la distribución de la renta puede favorecer el crecimiento económico al asegurar la vertebración social y la estabilidad institucional.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La cohesión social derivada de una menor desigualdad es un pilar importante para la estabilidad económica y la formación de un modelo de crecimiento sostenido a largo plazo.","tag":"T2","_type":"vf"},{"text":"En 1990, la población inmigrante en España representaba un porcentaje significativo en comparación con otros países de la UE.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En 1990 la inmigración en España era un fenómeno muy incipiente; el porcentaje comenzó a ser significativo fundamentalmente a partir de principios de los años 2000.","tag":"T2","_type":"vf"},{"text":"La entrada de inmigrantes en España ha contribuido al aumento de la población en edad de trabajar y del empleo.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El ascenso de la población en edad de trabajar en España en etapas recientes se ha debido, en gran medida, a una intensa entrada de inmigrantes, aliviando las tensiones demográficas.","tag":"T2","_type":"vf"},{"text":"La tasa de variación de la renta per cápita se puede calcular restando las tasas de variación de la productividad del trabajo y del empleo per cápita.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La variación de la renta per cápita se aproxima sumando (no restando) la tasa de variación de la productividad del trabajo y la tasa de variación del empleo per cápita.","tag":"T2","_type":"vf"},{"text":"El aumento de la proporción de población empleada no tiene límites.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Encuentra un límite natural de techo demográfico (Población en Edad de Trabajar) y por las tasas de actividad y de paro fisiológico.","tag":"T2","_type":"vf"},{"text":"La productividad del trabajo es considerada clave para el crecimiento económico, ya que permite el incremento del salario real y de la renta familiar.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Mejorar la eficiencia productiva por trabajador es la principal fuente real de aumentos sostenibles de salarios y capacidad adquisitiva a largo plazo.","tag":"T2","_type":"vf"},{"text":"Durante la década de 1990, la mayoría de los países europeos experimentaron una disminución en su capacidad de generación de empleo, similar a lo ocurrido en Estados Unidos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Europa (y particularmente España a partir de 1995) entró en una fase de intensa creación de empleo apoyada en la bonanza económica y reformas laborales.","tag":"T2","_type":"vf"},{"text":"Entre 1961 y 1985, la productividad del trabajo en España creció a una tasa menor que en Alemania.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En ese período de rápida industrialización, la productividad en España creció de forma espectacular a un 4,9% medio anual, muy por encima del 3,0% de Alemania.","tag":"T2","_type":"vf"},{"text":"Entre 1986 y 2022, el empleo per cápita en España experimentó un crecimiento positivo.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"A pesar de las crisis recurrentes, el empleo per cápita global registró un crecimiento medio positivo del 1,0% en la etapa 1986-2024, contribuyendo de forma notable al PIB per cápita.","tag":"T2","_type":"vf"},{"text":"La Población Activa (PA) es siempre mayor que la Población en Edad de Trabajar (PET).","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Es al revés: la Población Activa (empleados y parados) es un subconjunto de la Población en Edad de Trabajar, ya que esta última incluye también a los inactivos (estudiantes, jubilados, etc.).","tag":"T2","_type":"vf"},{"text":"El ascenso de la población en edad de trabajar fue más temprano e intenso en los países europeos menos desarrollados como España e Irlanda que en Estados Unidos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En Estados Unidos fue más temprano. En países como España e Irlanda, debido al retraso del baby boom, el ascenso fue 'algo más tardío' y se prolongó durante más tiempo.","tag":"T2","_type":"vf"},{"text":"En 2022, el porcentaje de población en edad de trabajar con respecto al total era mayor en España que en Alemania.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"En 2022, el porcentaje era del 65,4% en España frente a un menor 63,2% en Alemania debido a un envejecimiento más acelerado en el país germano.","tag":"T2","_type":"vf"},{"text":"Entre 1985 y 2022, el crecimiento del PIB per cápita en España se debió principalmente a un sustancial aumento de la productividad del trabajo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En la etapa pos-1985 (1986-2024), el factor que más contribuyó al crecimiento del PIB per cápita fue el empleo per cápita (+1,0%), mientras que el aumento de la productividad fue históricamente bajo (+0,6%).","tag":"T2","_type":"vf"},{"text":"Desde 1970, la evolución del PIB per cápita y la productividad del trabajo en España han mostrado una convergencia notable.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ambas sendas divergieron fuertemente; sobre todo a partir del boom de finales de los 90, el PIB per cápita subió arrastrado por la incorporación laboral mientras la productividad caía y se estancaba relativamente.","tag":"T2","_type":"vf"},{"text":"En los periodos de recesión en España posteriores a 1986, el empleo por habitante ha aumentado, lo que ha provocado una disminución de la productividad del trabajo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En las recesiones españolas el empleo por habitante se contrae abruptamente mediante la destrucción de ocupación, lo que ha provocado incrementos (y no disminuciones) puramente estadísticos en la productividad del trabajo (comportamiento anticíclico).","tag":"T2","_type":"vf"},{"text":"El comportamiento anticíclico de la productividad del trabajo durante la crisis de 2020 en España fue similar al de crisis anteriores.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En la crisis de 2020 la productividad se desplomó drásticamente junto al PIB. Al contrario que en crisis previas, políticas como los ERTE mantuvieron artificialmente parte del empleo operativo pese al cierre, provocando una caída brusca de la productividad por trabajador (comportamiento atípicamente procíclico).","tag":"T2","_type":"vf"},{"text":"El aumento de la productividad del trabajo se explica únicamente por el aumento del capital físico por trabajador.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"También se fundamenta en los aumentos del capital humano (formación) y, crucialmente, en el progreso tecnológico general o Productividad Total de los Factores (PTF).","tag":"T2","_type":"vf"},{"text":"La productividad total de los factores (PTF) mide la mejora en la eficiencia con la que se combinan trabajo y capital en el proceso productivo.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Representa ese residuo que multiplica la producción no atribuible a un simple aumento del volumen de inputs, indicando avances en tecnología, organización e innovación.","tag":"T2","_type":"vf"},{"text":"La apertura al exterior y una mayor competencia en los mercados interiores tienden a disminuir la productividad total de los factores a corto plazo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Una mayor competencia incentiva la asignación eficiente de recursos, la adopción de tecnologías y la innovación, lo que tiende a incrementar la PTF.","tag":"T2","_type":"vf"},{"text":"El capital residencial se considera capital directamente productivo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En la Contabilidad Nacional, el capital residencial engloba viviendas; expresamente, 'no se destina a la producción de bienes y servicios' y, por ende, difiere del Capital Directamente Productivo.","tag":"T2","_type":"vf"},{"text":"El capital humano incluye la salud, los conocimientos, las habilidades y los talentos de los trabajadores.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El capital humano trasciende la educación formal y engloba cualquier aptitud o estado (como la salud y la destreza) que aumente la contribución y el rendimiento del trabajador.","tag":"T2","_type":"vf"},{"text":"La inversión en el sistema educativo formal es una de las formas de generar capital humano.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Se considera uno de los métodos principales de inversión en factor trabajo estratégico, junto con el aprendizaje basado en la experiencia (formación en el empleo).","tag":"T2","_type":"vf"},{"text":"El gasto en educación en España como porcentaje del PIB ha experimentado un descenso constante desde la década de los 90 hasta la actualidad.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ha habido un aumento en el esfuerzo inversor educativo en el largo plazo, moviéndose de manera oscilatoria entre el 4% y el 5% del PIB desde la década de los 90.","tag":"T2","_type":"vf"},{"text":"En 2022, el número medio de años de estudio de la población activa en España era similar al de 1960.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El nivel ha crecido enormemente, pasando de apenas 5,3 años en 1960 a superar los 12 años de media (12,1 en 2024).","tag":"T2","_type":"vf"},{"text":"El aumento en el número de años de estudio en España se ha correspondido directamente con la evolución de la Productividad Aparente del Trabajo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"A pesar de triplicar o duplicar los años medios de formación, esa mejora no se ha traducido de manera proporcional o directa en incrementos en la Productividad Aparente, evidenciando problemas de sobrecualificación o desajustes formativos.","tag":"T2","_type":"vf"},{"text":"La Productividad Aparente del Trabajo (PAT) en España se ha mantenido constante entre 1960 y 2022.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La PAT de España no se ha mantenido estática; de hecho, entre 1960 y 2024 experimentó un crecimiento total acumulado en términos monetarios de aproximadamente +47.000€.","tag":"T2","_type":"vf"},{"text":"En la función de producción Cobb-Douglas presentada, el parámetro a representa la elasticidad del producto respecto del capital humano.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El parámetro α (alfa) representa convencionalmente la elasticidad respecto al capital físico (K), mientras que la elasticidad del capital humano se simboliza con β (beta).","tag":"T2","_type":"vf"},{"text":"La Productividad Total de los Factores (PTF) se calcula como la suma de la productividad media del trabajo, el capital físico por trabajador y el capital humano por trabajador.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La PTF actúa como multiplicador (progreso técnico) y se computa en las variaciones despejándola matemáticamente como un 'residuo' tras deducir las contribuciones marginales puras del factor capital y trabajo a la producción total.","tag":"T2","_type":"vf"},{"text":"Entre 1960 y 2022, la mayor contribución al aumento de la PAT en España provino del aumento del capital humano.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El aumento de la Productividad Aparente de España fue soportado mayoritariamente por la PTF (49%) y el capital físico (36%). La aportación aislada del capital humano se quedó en un 15%.","tag":"T2","_type":"vf"},{"text":"La PTF en España experimentó un notable aumento desde el inicio del decenio de 1990 hasta 2022.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Por el contrario, los estudios marcan un 'nulo aumento' o estancamiento casi persistente en los niveles de Productividad Total de los Factores desde inicios de la década de los 90 en España.","tag":"T2","_type":"vf"},{"text":"Desde el final del decenio de 1980 hasta la reciente crisis, la productividad del trabajo en España, en relación con la media de la UE-15, experimentó un aumento constante.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La productividad relativa en España (como porcentaje de la media de la Eurozona) experimentó un prolongado descenso desde finales de los años 80 hasta la eclosión de la Gran Recesión de 2008.","tag":"T2","_type":"vf"},{"text":"En las primeras etapas de desarrollo de un país, la importación de bienes de equipo no juega un papel relevante en el aumento del capital físico por trabajador.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Es un mecanismo vital: importar tecnología externa ya madura mediante bienes de equipo permite saltos inmediatos y formidables de mecanización y capitalización (efecto catch-up industrial).","tag":"T2","_type":"vf"},{"text":"Un elevado grado de desarrollo facilita la adquisición y asimilación de tecnologías de otros países.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Países más desarrollados cuentan con infraestructuras científicas y un capital humano con aptitudes que les permiten absorber rápidamente avances de otros territorios.","tag":"T2","_type":"vf"},{"text":"En 2022, la ratio de intensidad investigadora en España superaba la de los países más desarrollados.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La ratio de inversión en I+D como porcentaje del PIB de la economía española está históricamente estancada muy por debajo de la media de países desarrollados clave (como Francia o Alemania).","tag":"T2","_type":"vf"},{"text":"El estancamiento de la PTF en España se puede atribuir principalmente a diferencias en el número de investigadores y en el nivel de educación de la población en comparación con otros países desarrollados.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Ese factor explícito (el tejido investigador reducido, combinado con disonancias en la aplicabilidad del capital humano y la innovación en las pymes) bloquea y explica en gran medida el 'residuo de Solow' estancado del país.","tag":"T2","_type":"vf"},{"text":"España dedica un esfuerzo de inversión en I+D sobre el PIB similar al de Francia y Alemania.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"España dedica un porcentaje notablemente inferior (que suele rondar el 1,4% del PIB), lejos de las cifras de Francia y muy distanciado de las elevadas tasas de innovación e investigación de Alemania.","tag":"T2","_type":"vf"},{"text":"Los factores de oferta a largo plazo, como la población, el capital físico y humano y la PTF, no presentan distorsiones a corto plazo en cuanto a su evolución y ajuste de precios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Existen grandes rigideces. Ante variaciones del ciclo, no todo se ajusta instantáneamente mediante precios, lo que genera amplias alteraciones y distorsiones a corto plazo en el nivel de utilización (empleo y capital instalados inactivos, etc.).","tag":"T2","_type":"vf"},{"text":"El PIB potencial describe la tendencia de la demanda agregada a largo plazo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Describe la tendencia o la capacidad de crecimiento natural y máxima de la *oferta agregada* a largo plazo.","tag":"T2","_type":"vf"},{"text":"El output gap es la suma de las sendas de avance del PIB potencial y real.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Es la *diferencia* ('brecha') entre el PIB potencial máximo (o tendencial de la oferta) y el PIB que realmente se está registrando.","tag":"T2","_type":"vf"},{"text":"Durante el periodo 1995-2007, el PIB real en España se mantuvo por debajo de su PIB potencial.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En el periodo de la expansión (1995-2007) el PIB real español estuvo recalentado y empujado de forma continuada sistemáticamente por *encima* del PIB potencial tendencial.","tag":"T2","_type":"vf"},{"text":"Los principales momentos expansivos de la economía española han estado acompañados de disminuciones de precios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Los prolongados momentos expansivos de la economía española han generado excesos de demanda que han ido tradicionalmente acompañados de fuertes tensiones alcistas y diferenciales de inflación (encarecimiento).","tag":"T2","_type":"vf"},{"text":"La crisis del decenio de 1970 en España estuvo influenciada por shocks de oferta negativos, como las elevaciones del precio del crudo petrolífero.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La macrocrisis que azotó a España tras 1973/1979 fue producto de una grave distorsión mundial nacida de un shock de costes en la oferta causado por la subida de la materia prima energética.","tag":"T2","_type":"vf"},{"text":"La masiva entrada de inmigrantes en los decenios de 1990 y 2000 constituyó un shock de oferta negativo para la economía española.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ese ingente aumento repentino de la mano de obra útil actuó expansivamente ensanchando la capacidad productiva del país (shock de oferta muy positivo que engrosó el PIB potencial).","tag":"T2","_type":"vf"},{"text":"Tras el ingreso de España en las Comunidades Europeas y la entrada del euro, el rápido aumento de la demanda no generó tensiones alcistas sobre los precios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Toda la etapa de crecimiento en torno a la entrada del euro, alimentada por las fuertes expansiones del crédito y del consumo en España, originó una persistente inflación diferencial que mermó competitividad.","tag":"T2","_type":"vf"},{"text":"Antes de la entrada del euro, las devaluaciones de la moneda eran una herramienta utilizada para ganar competitividad y reestablecer el equilibrio exterior en España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Constituía el recurso monetario clásico de las autoridades españolas (usado a fondo, por ejemplo, en la crisis de 1992-1993) para abaratar sus bienes tras etapas de recalentamiento con el fin de salvar los déficit por cuenta corriente.","tag":"T2","_type":"vf"},{"text":"Entre 2002 y 2007, la reducción de los tipos de interés en la eurozona no tuvo un impacto significativo en la demanda interior española.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Tuvo un impacto devastadoramente expansivo: generó un 'boom' histórico del endeudamiento que alimentó con fiereza el consumo y retroalimentó por años la burbuja de la construcción residencial.","tag":"T2","_type":"vf"},{"text":"La crisis posterior a 2007 se caracterizó en España por un aumento de la demanda interna y una disminución de las exportaciones.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Lo que marcó la Gran Recesión pos-2007 fue, por el contrario, el hundimiento en picado del consumo y demanda nacionales; esto forzó a las empresas españolas, que ya no tenían mercado propio, a salir fuertemente al exterior, incrementando las exportaciones.","tag":"T2","_type":"vf"},{"text":"Desde la crisis de 2009, el sector exterior español ha mostrado un buen comportamiento a pesar de registrar incrementos del PIB superiores al 3%.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El gran éxito y corrección macroeconómica en la última década ha sido que la economía pudo rebotar intensamente creciendo un +3% sin incurrir (por primera vez históricamente) en fuertes déficits del saldo exterior.","tag":"T2","_type":"vf"},{"text":"El tardío proceso de apertura a la competencia internacional en España contribuyó a una menor intensidad de las fluctuaciones económicas en comparación con la media europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Por el contrario, España sufre por problemas estructurales fluctuaciones más intensas, con expansiones del PIB más vertiginosas que Europa y debacles muchísimo más agudas, sobre todo en los indicadores de paro.","tag":"T2","_type":"vf"},{"text":"A partir de 2020, España experimentó un nuevo desequilibrio macroeconómico caracterizado por un incremento de la inflación.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Tras las inyecciones de estímulo en la post-pandemia y el agravamiento de tensiones en cuellos de botella y de carácter energético, el IPC escaló brutalmente causando el shock inflacionario reciente.","tag":"T2","_type":"vf"},{"text":"La relevancia económica del sector primario aumenta significativamente cuando se consideran las industrias manufactureras asociadas a las que suministra materias primas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El sector primario suministra materias primas a determinadas industrias, por lo que su peso conjunto en Valor Añadido Bruto y empleo se eleva considerablemente al integrar las manufacturas asociadas[cite: 39, 308].","tag":"T3","_type":"vf"},{"text":"La gestión de la PAC se simplificó mediante la creación de una Organización Común de Mercados única para todos los productos agrarios.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"A partir de 2007, se fusionaron 21 Organizaciones Comunes de Mercado (OCM) existentes en una OCM única para todos los productos agrarios[cite: 209, 283].","tag":"T3","_type":"vf"},{"text":"Uno de los objetivos históricos de la PAC ha sido garantizar precios elevados para el consumidor final con el fin de maximizar el beneficio agrario.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Uno de los objetivos históricos y principios fundacionales de la PAC ha sido asegurar el aprovisionamiento alimenticio de la población a unos precios razonables, no elevados[cite: 203, 272].","tag":"T3","_type":"vf"},{"text":"El crecimiento de la productividad del trabajo agrario en España se explica fundamentalmente por la mejora de los rendimientos por hectárea, siendo irrelevante la ratio de estructuras.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Ambos factores han contribuido a las ganancias de productividad, de hecho, la ratio de estructuras (superficie por empleo) lo ha hecho en mayor medida a partir de 1985[cite: 154, 155, 298].","tag":"T3","_type":"vf"},{"text":"El diferencial favorable de productividad del trabajo de España respecto a la media de la UE se explica, en parte, por el elevado peso de países con productividades muy bajas y alta cuota de empleo agrario.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La media europea se ve arrastrada a la baja por la inclusión de países con grandes cuotas de empleo agrario y productividades muy inferiores a las de Europa Occidental[cite: 259, 260].","tag":"T3","_type":"vf"},{"text":"La PAC contempla la creación de una reserva financiera específica destinada a intervenir en caso de crisis que afecten a la gestión de los mercados.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La reforma contempla la creación de una reserva de crisis por un máximo de 1.500 millones de euros para mejorar la gestión y regulación de los mercados agrarios[cite: 245, 317].","tag":"T3","_type":"vf"},{"text":"En el marco actual de la PAC, la Comisión Europea ha centralizado todas las decisiones, eliminando la capacidad de los Estados miembros para adaptar las normas a su realidad local.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La nueva PAC Post-2020 tiene por objeto ampliar la flexibilidad de los Estados miembros para adaptar las medidas a las condiciones locales a través de sus Planes Estratégicos Nacionales[cite: 219, 263].","tag":"T3","_type":"vf"},{"text":"El coeficiente de apertura externa de la agricultura española ha experimentado un crecimiento notable desde 1985, reflejando una mayor integración internacional.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Debido a una creciente integración internacional, el coeficiente de apertura externa de la agricultura española casi se ha triplicado entre los años 1985 y 2024[cite: 105, 277].","tag":"T3","_type":"vf"},{"text":"El sistema agrario español actual concede una importancia creciente a las subvenciones otorgadas dentro del marco de la PAC.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El sistema agrario actual, o sistema agroindustrial, se caracteriza explícitamente por una importancia creciente de las subvenciones otorgadas dentro del marco de la Política Agrícola Común[cite: 115, 119].","tag":"T3","_type":"vf"},{"text":"La nueva \"arquitectura verde\" de la PAC es una medida exclusiva destinada a las explotaciones de menor dimensión económica.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La \"arquitectura verde\" es un conjunto que engloba a todas las explotaciones a través de instrumentos como el Pago básico y los Eco-esquemas, no siendo exclusiva para las más pequeñas[cite: 233, 269].","tag":"T3","_type":"vf"},{"text":"Durante el periodo previo a la transformación de 1960, el sector agrario español se caracterizaba por presentar una elevada relación capital-producto.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Antes de los años 60, la agricultura española carecía de mecanización y era tradicional e intensiva en factor trabajo, por lo que su relación capital-producto era sumamente baja[cite: 302].","tag":"T3","_type":"vf"},{"text":"La liberalización comercial impulsada por la OMC ha eliminado los riesgos de competencia para las producciones de frutas y verduras españolas frente a terceros países.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La liberalización promovida por la OMC reduce barreras al comercio, lo cual facilita la entrada de productos extracomunitarios y aumenta la competencia para las producciones españolas[cite: 305].","tag":"T3","_type":"vf"},{"text":"El sector agrario español presenta un carácter equilibrado, donde la mayoría de la producción proviene de un gran número de pequeñas explotaciones familiares.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Existe un gran desequilibrio, ya que las explotaciones grandes (más de 60 UDE) representan solo el 17,7% del total pero acaparan el 80,2% de la producción estándar total[cite: 188].","tag":"T3","_type":"vf"},{"text":"El principio de \"Preferencia Comunitaria\" de la PAC establece que los Estados miembros deben priorizar el consumo de sus propios productos nacionales frente a los de otros socios de la Unión Europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El principio de Preferencia Comunitaria implica que las producciones agrarias de la Comunidad se protegen frente a la competencia de otros países externos, pero existe una Unidad de Mercado para la libre circulación entre los estados miembros[cite: 205, 206].","tag":"T3","_type":"vf"},{"text":"Los nuevos \"Eco-Esquemas\" de la PAC son requisitos de cumplimiento obligatorio para todos los agricultores que deseen recibir el pago básico.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Aunque los Estados miembros deben establecer requisitos adicionales, los agricultores quedan en libertad de acogerse o no a estos Eco-esquemas[cite: 241, 266].","tag":"T3","_type":"vf"},{"text":"La estrategia \"De la granja a la mesa\" tiene como objetivo reducir el peso de la agricultura ecológica en la superficie agrícola utilizada para garantizar el abastecimiento.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La estrategia se plantea incrementar la agricultura ecológica, fijando como objetivo para 2030 que suponga el 25% de la Superficie Agrícola Utilizada[cite: 226, 256].","tag":"T3","_type":"vf"},{"text":"Italia basa su modelo de productividad agraria en una disponibilidad de superficie por persona ocupada superior a la media de la Europa Verde.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Italia destaca por una elevadísima productividad de la tierra, pero su superficie por empleo es la más baja al compararla con Alemania, España y Francia[cite: 158, 280].","tag":"T3","_type":"vf"},{"text":"La mecanización y sustitución de trabajo por capital a partir de 1960 fue un proceso impulsado, en gran medida, por el éxodo rural hacia las ciudades.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El éxodo rural provocó una escasez de mano de obra, lo que derivó en un acentuado encarecimiento relativo de los salarios agrarios, incentivando la mecanización del campo[cite: 178, 286].","tag":"T3","_type":"vf"},{"text":"En la estructura productiva española, las pequeñas explotaciones son las que presentan una mayor especialización en orientaciones intensivas como la horticultura o la avicultura.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Son las grandes explotaciones (más de 60 UDE) las que alcanzan la mayor Producción Estándar Total por unidad de superficie, indicando una mayor intensidad productiva frente a las pequeñas[cite: 188, 289].","tag":"T3","_type":"vf"},{"text":"Históricamente, los precios que perciben los agricultores por sus productos han crecido por encima del Índice de Precios de Consumo (IPC).","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Los precios percibidos por la venta de las producciones agrarias han crecido menos que el Índice de Precios al Consumo (IPC)[cite: 179, 292].","tag":"T3","_type":"vf"},{"text":"Los productos cárnicos y el ganado en pie forman parte de los capítulos más deficitarios del comercio exterior agrario español.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las carnes y el ganado en pie poseen una elevada competitividad y constituyen el segundo capítulo exportador, siendo fuertemente superavitarios[cite: 107, 295].","tag":"T3","_type":"vf"},{"text":"Los productos alimenticios presentan, por lo general, una elasticidad-renta baja o incluso negativa en economías desarrolladas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"De acuerdo con la Ley de Engel, conforme aumenta la renta en un país desarrollado, la proporción del gasto que se destina a alimentos de primera necesidad tiende a reducirse[cite: 311].","tag":"T3","_type":"vf"},{"text":"El saldo comercial agroalimentario de España con el del Reino Unido es deficitario, lo que lastra la tasa de cobertura extracomunitaria.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Reino Unido es considerado uno de los mejores clientes de España en este sector, lo que representa fuertes exportaciones y un saldo comercial positivo o superávit[cite: 112, 314].","tag":"T3","_type":"vf"},{"text":"El encarecimiento de la mano de obra asalariada por encima del precio de los bienes de inversión ha incentivado la mecanización del campo español.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Los salarios agrarios han crecido a un ritmo muy superior al precio de los bienes de inversión, como la maquinaria, incentivando a los agricultores a reducir el requerimiento de trabajo por unidad de superficie[cite: 178, 320].","tag":"T3","_type":"vf"},{"text":"El sector energético español se caracteriza por un elevado grado de internacionalización de sus empresas líderes, especialmente en mercados latinoamericanos.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Existe un elevado grado de internacionalización de las principales empresas energéticas españolas en países como Perú o Venezuela[cite: 3212, 3213].","tag":"T4","_type":"vf"},{"text":"La industria es el sector económico que menor cantidad de energía consume, actuando principalmente como un proveedor de inputs para los servicios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La energía actúa como un input para el resto de los sectores productivos, siendo precisamente la industria el sector que mayor cantidad de energía consume[cite: 3224].","tag":"T4","_type":"vf"},{"text":"El proceso de privatización de grandes empresas energéticas en las últimas décadas ha eliminado las estructuras de oligopolio en el mercado español de hidrocarburos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"A pesar de las privatizaciones, se ha mantenido un elevado grado de concentración en el sector; por ejemplo, en hidrocarburos Repsol, Cepsa y BP conforman un oligopolio que controla más del 70% del mercado[cite: 3320, 3321].","tag":"T4","_type":"vf"},{"text":"El incremento del consumo energético en las actividades productivas españolas se explica, en parte, por el proceso de sustitución de mano de obra por energía.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El gran crecimiento del consumo energético en las actividades productivas ha sido, en parte, el resultado de un proceso de sustitución de mano de obra por energía[cite: 3232].","tag":"T4","_type":"vf"},{"text":"España ha alcanzado históricamente el equilibrio en su balance energético gracias a un elevado grado de autoabastecimiento basado en recursos propios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El balance energético español registra históricamente un desajuste, manteniendo una fuerte dependencia del exterior y un grado de autoabastecimiento de solo el 30% de las necesidades de energía primaria[cite: 3285, 3316, 3317].","tag":"T4","_type":"vf"},{"text":"En la fase de transporte de electricidad en alta tensión, el mercado opera en régimen de libre competencia entre Red Eléctrica Española e Iberdrola.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En la fase de transporte en alta tensión no hay libre competencia, sino que el monopolio lo ostenta exclusivamente Red Eléctrica Española[cite: 3326].","tag":"T4","_type":"vf"},{"text":"El sector energético se considera estratégico no solo por su valor propio, sino por su capacidad de generar efectos de arrastre que mejoran la eficiencia del resto de actividades productivas al ser un input fundamental.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Al ser un input fundamental para el resto de los sectores, la energía tiene efectos de arrastre sobre otras ramas, de modo que si este sector gana en eficiencia, se benefician directamente las demás actividades productivas[cite: 3224, 3225].","tag":"T4","_type":"vf"},{"text":"Gracias al reciente e intenso crecimiento de las energías renovables, la producción nacional de energía en España es ya suficiente para satisfacer la totalidad de la demanda interna de las actividades productivas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"A pesar del fuerte crecimiento de las energías renovables, la producción nacional sigue siendo insuficiente para satisfacer la demanda global, manteniendo una fuerte dependencia de las importaciones del exterior[cite: 3316, 3317].","tag":"T4","_type":"vf"},{"text":"En el sistema eléctrico español, las empresas dominantes mantienen una integración vertical total que incluye el control absoluto de la fase de transporte en alta tensión.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La integración vertical de las empresas dominantes es únicamente parcial abarcando las fases de generación, distribución y comercialización, ya que en la fase de transporte en alta tensión el monopolio recae sobre Red Eléctrica Española[cite: 3326].","tag":"T4","_type":"vf"},{"text":"La transformación de la estructura de la demanda energética en España durante la década de los noventa se caracterizó principalmente por el proceso de sustitución del petróleo por el gas natural.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Durante la década de los 90, la transformación principal de la demanda se centró efectivamente en la sustitución del petróleo por el gas natural[cite: 3235].","tag":"T4","_type":"vf"},{"text":"Tras los procesos de privatización de grandes compañías como Repsol o Endesa, el sector público español ha retirado por completo su participación en todas las ramas de actividad del sector energético.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Aunque las privatizaciones redujeron notablemente la participación pública en el sector, esta no se retiró por completo, manteniéndose excepciones en áreas como el sector del carbón[cite: 3318].","tag":"T4","_type":"vf"},{"text":"La industria manufacturera se distingue por tener una productividad del trabajo superior a la de la agricultura y los servicios, incorporando más rápidamente el progreso técnico.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La industria manufacturera presenta una productividad laboral mayor que la agricultura y los servicios porque es más susceptible de incorporar el progreso técnico que ahorra mano de obra[cite: 3332].","tag":"T4","_type":"vf"},{"text":"Siguiendo los criterios del Sistema Europeo de Cuentas (SEC), el concepto de industria incluye tanto las actividades extractivas como todas las manufactureras.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El Sistema Europeo de Cuentas (SEC) delimita y considera como industria exclusivamente a las actividades manufactureras, excluyendo a las extractivas[cite: 3338].","tag":"T4","_type":"vf"},{"text":"Las ramas industriales de 'demanda fuerte' son aquellas vinculadas a sectores tradicionales como el textil y la siderurgia debido a su estabilidad histórica.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las ramas de demanda fuerte son las de más reciente desarrollo y mayor innovación (como aeroespacial, electrónica y productos farmacéuticos), mientras que los sectores tradicionales como el textil o la siderurgia se encuadran en las ramas de demanda débil[cite: 3341, 3342].","tag":"T4","_type":"vf"},{"text":"Las empresas pertenecientes a sectores industriales avanzados operan generalmente en mercados internacionales muy competitivos y presentan una oferta más concentrada.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las actividades industriales avanzadas presentan una oferta mucho más concentrada en empresas líderes y operan en mercados internacionales altamente competitivos con un mayor nivel de apertura exterior[cite: 3371, 3372, 3375].","tag":"T4","_type":"vf"},{"text":"Las actividades industriales tradicionales se caracterizan por emplear mayoritariamente mano de obra con alta cualificación universitaria en comparación con las avanzadas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Son las ramas industriales avanzadas las que utilizan mano de obra más cualificada, mientras que las actividades tradicionales emplean menor cantidad de capital humano y tecnológico al basarse en tecnologías estandarizadas[cite: 3378, 3545].","tag":"T4","_type":"vf"},{"text":"La pérdida de peso relativo de la manufactura en el VAB y el empleo es una tendencia que España comparte con las principales economías europeas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La pérdida de peso de la industria manufacturera tanto en el VAB como en la generación de empleo es una tendencia de desindustrialización que España comparte abiertamente con las principales economías europeas[cite: 3431].","tag":"T4","_type":"vf"},{"text":"El proceso de desindustrialización en España ha sido más severo si se mide en términos de VAB real que si se analiza a través de la evolución del empleo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El proceso de contracción del peso de las manufacturas resulta ser estadísticamente menor cuando se mide a través del VAB real en comparación a si se analiza la destrucción relativa de empleo o el VAB a precios corrientes[cite: 3434].","tag":"T4","_type":"vf"},{"text":"La progresiva externalización de servicios digitales y TIC por parte de la industria ha provocado un aumento estadístico del peso del sector industrial en el conjunto de la economía.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La progresiva externalización de servicios TIC y digitales por parte de las empresas industriales genera el efecto contrario, reduciendo su peso estadístico al pasar a contabilizarse esos recursos dentro del sector servicios[cite: 3436].","tag":"T4","_type":"vf"},{"text":"La producción industrial española muestra una intensidad de fluctuación cíclica superior a la del conjunto de la economía nacional.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La industria española sufre una mayor intensidad de fluctuaciones cíclicas, retrocediendo notablemente más en las fases depresivas y avanzando también más rápido en las fases de recuperación en comparación con la economía general[cite: 3447].","tag":"T4","_type":"vf"},{"text":"Tras la crisis sanitaria de la Covid-19, la industria española ha logrado recuperar y superar su cuota de participación en la producción industrial total de la Unión Europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Tras la pandemia de la Covid-19, en lugar de superar su cuota, la participación relativa de la industria española en la producción industrial total de la Unión Europea se volvió a reducir[cite: 3483].","tag":"T4","_type":"vf"},{"text":"La fragmentación internacional de la producción consiste en trasladar las fases de la cadena de valor con mayor contenido tecnológico a países con salarios bajos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La deslocalización y fragmentación consisten en trasladar hacia economías con menores niveles de renta y salarios las fases más rutinarias e intensivas en trabajo (como la fabricación), conservando las de mayor valor tecnológico en los países desarrollados[cite: 3490].","tag":"T4","_type":"vf"},{"text":"El fenómeno del retorno de la actividad industrial a los países de origen se ve impulsado por el abaratamiento del transporte internacional.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El retorno de la actividad industrial deslocalizada hacia los países de origen se ve impulsado, entre otras transformaciones del entorno internacional, por el encarecimiento de los costes del transporte, no por su abaratamiento[cite: 3497, 3498].","tag":"T4","_type":"vf"},{"text":"El dinamismo exportador reciente de la industria española se fundamenta principalmente en las ventajas competitivas de sus ramas más tradicionales.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El mayor dinamismo exportador de España se ha registrado precisamente en las ramas industriales más tradicionales, apalancándose en las ventajas competitivas claras de la economía en estas áreas[cite: 3529].","tag":"T4","_type":"vf"},{"text":"Las empresas españolas situadas en sectores de alta intensidad tecnológica suelen estar financiadas mayoritariamente por capital residente nacional.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El avance y desarrollo de las actividades de mayor requerimiento tecnológico en España ha estado fuertemente impulsado por la penetración de capital extranjero (generando más del 50% de su VAB), mientras que la propiedad de residentes predomina en las ramas tradicionales[cite: 3546].","tag":"T4","_type":"vf"},{"text":"La especialización de España en actividades de tecnología baja se justifica por la gran dimensión media de sus empresas y su elevada dotación de capital físico.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las actividades tradicionales de baja tecnología en España se caracterizan por todo lo contrario: una pequeña dimensión media empresarial y una menor cantidad de capital físico, humano y tecnológico, operando con mayor intensidad de recursos naturales y trabajo[cite: 3545].","tag":"T4","_type":"vf"},{"text":"La competencia de países del este de Europa ha mermado la cuota de exportación española en manufacturas de alto contenido tecnológico como las TIC.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las grandes empresas multinacionales tecnológicas se han deslocalizado hacia nuevos países industriales europeos como Hungría, República Checa y Polonia, superando las cuotas españolas y mermando sus exportaciones mundiales de manufacturas TIC[cite: 3550, 3551].","tag":"T4","_type":"vf"},{"text":"Durante las últimas décadas, la productividad del trabajo en la industria española ha crecido a un ritmo superior al promedio de la Eurozona.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Entre los años 1995 y 2024, la productividad laboral en la industria española aumentó a una tasa media del 1,4%, siendo inferior al promedio del 1,9% alcanzado por los países de la Eurozona[cite: 3556].","tag":"T4","_type":"vf"},{"text":"La mejora de la competitividad en costes lograda durante la Gran Recesión se basó en una devaluación interna mediante la moderación salarial y el ajuste de empleo.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Durante la Gran Recesión se obtuvo una mejora en la competitividad en costes originada por una 'devaluación interna', resultante de la destrucción masiva de empleo, el cierre de empresas ineficientes y la aplicación de contención y moderación salarial[cite: 3559].","tag":"T4","_type":"vf"},{"text":"La fortaleza de las exportaciones industriales españolas se explica porque todo su tejido empresarial presenta niveles de eficiencia productiva muy homogéneos.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El tejido industrial español es altamente heterogéneo: conviven grandes empresas exportadoras, con liderazgo y muy productivas, junto a otras empresas de menor tamaño, con mucha menor eficiencia productiva y orientadas al mercado interno[cite: 3600, 3601].","tag":"T4","_type":"vf"},{"text":"España mantiene su competitividad en ciertos segmentos industriales aprovechando una mano de obra más barata en relación con los países europeos más avanzados.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Una de las claves de la competitividad en la exportación española radica en su especialización productiva en ciertos segmentos que logran competir aprovechando una mano de obra que es comparativamente más barata que en los países europeos más avanzados[cite: 3602].","tag":"T4","_type":"vf"},{"text":"La paradoja de las exportaciones españolas reside en que estas crecen a pesar de que la calidad de los productos es inferior a la de sus competidores.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El incremento sostenido y parte del éxito exportador no radica en una calidad inferior, sino en la mayor calidad comparada de determinadas producciones industriales nacionales que logran ofrecer una relación calidad-precio muy favorable[cite: 3605].","tag":"T4","_type":"vf"},{"text":"Históricamente, en España ha predominado una visión liberal de la política industrial que desconfiaba de la intervención pública directa.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Históricamente ha prevalecido una política industrial de corte netamente liberal en España, la cual se ha caracterizado por su desconfianza ante la viabilidad de recurrir a la intervención pública directa para desarrollar el sector[cite: 3608].","tag":"T4","_type":"vf"},{"text":"La creación de la SEPI en 2001 tuvo como finalidad principal revertir las privatizaciones de los años 90 para recuperar el control estatal de la industria.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La SEPI no fue concebida para revertir las políticas de privatización, sino que se creó para reordenar, integrar y administrar eficientemente las empresas que aún formaban parte del remanente del sector público empresarial[cite: 3612].","tag":"T4","_type":"vf"},{"text":"La política industrial española actual se define como 'vertical', ya que se centra exclusivamente en proteger ramas específicas mediante subvenciones directas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La nueva política industrial en España se concibe de naturaleza puramente 'horizontal', dirigiéndose a mejorar las condiciones generales competitivas de todas las empresas (mediante estímulos a la innovación, formación e internacionalización) en lugar de proteger verticalmente ramas específicas[cite: 3613, 3614].","tag":"T4","_type":"vf"},{"text":"Los servicios no destinados a la venta se definen por suministrarse a través del mercado a precios que cubren íntegramente sus costes de producción.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Los servicios no destinados a la venta son aquellos suministrados por el sector público de forma gratuita o a un precio totalmente desvinculado de su coste real de producción.","tag":"T5","_type":"vf"},{"text":"Los denominados 'servicios estancados' son aquellos que permiten una creciente capitalización e incorporación de tecnología para mejorar su productividad.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Son los 'servicios progresivos' los que permiten esta capitalización. Los 'estancados' muestran enormes dificultades para reducir la mano de obra por unidad de producto sin mermar la calidad o cantidad.","tag":"T5","_type":"vf"},{"text":"Una de las principales dificultades para medir la productividad en servicios como la Administración Pública es que la producción se estima a menudo mediante los recursos o 'inputs' utilizados.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Al atenderse más a los recursos utilizados (inputs) que al verdadero resultado generado (output), resulta muy complejo estimar la evolución real de la productividad en sectores como la Administración Pública o la Sanidad.","tag":"T5","_type":"vf"},{"text":"Las actividades de contabilidad o publicidad realizadas internamente por una empresa industrial se contabilizan estadísticamente como parte del valor añadido del sector servicios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Las actividades terciarias producidas internamente por empresas de otros sectores no se contabilizan en el sector servicios; únicamente pasan a formar parte estadística del terciario cuando la empresa industrial las externaliza.","tag":"T5","_type":"vf"},{"text":"La necesaria concurrencia de la producción y el consumo en el espacio y el tiempo es un rasgo característico de gran parte de las actividades terciarias.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Es uno de los rasgos definitorios fundamentales del sector terciario, junto con la intangibilidad, la importancia del contacto con el usuario y la elevada intensidad en mano de obra.","tag":"T5","_type":"vf"},{"text":"El proceso de terciarización de la economía española se produjo de forma temprana y simultánea al de los principales países de la Unión Europea.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"En España, el proceso de terciarización ha sido relativamente reciente (acelerado a partir de los años ochenta), mientras que en las principales economías de la UE este proceso se experimentó con anterioridad.","tag":"T5","_type":"vf"},{"text":"El concepto de 'sector refugio' en los servicios se apoya en factores de oferta tradicionales como el predominio de las PYMEs y los bajos costes de acceso al mercado.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Las reducidas barreras de entrada, los bajos requerimientos de capital y el predominio de pequeñas empresas permiten que el sector absorba mano de obra expulsada de otros sectores en épocas de dificultad.","tag":"T5","_type":"vf"},{"text":"La expansión del peso de los servicios en la producción nacional a precios corrientes se explica fundamentalmente porque sus precios han crecido a un ritmo inferior al de los bienes industriales.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Se explica exactamente por lo contrario: ha existido un encarecimiento relativo de los servicios, es decir, sus precios han crecido a un ritmo marcadamente superior al de los bienes industriales.","tag":"T5","_type":"vf"},{"text":"El sector servicios tiende a aumentar su participación relativa en la producción real de la economía durante las etapas de crisis económica.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El sector terciario es menos sensible a las fluctuaciones cíclicas extremas que la industria o la construcción, por lo que su peso relativo dentro de la economía aumenta automáticamente durante las etapas depresivas.","tag":"T5","_type":"vf"},{"text":"El desplazamiento masivo del empleo hacia el sector servicios en España es una consecuencia directa del crecimiento superior de su productividad frente a la agricultura o la industria.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El empleo se desplaza a los servicios precisamente por lo contrario: su productividad crece a un ritmo inferior al de la agricultura y la industria, lo que obliga a incorporar mucha más mano de obra para poder atender los aumentos de la demanda.","tag":"T5","_type":"vf"},{"text":"Históricamente, la gran mayoría de las actividades terciarias en España han estado plenamente expuestas a la competencia internacional, reflejando su peso en el empleo.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Históricamente, y a excepción de sectores específicos como el turismo, la inmensa mayoría de las actividades terciarias han estado muy protegidas y al margen de la competencia internacional.","tag":"T5","_type":"vf"},{"text":"El fuerte avance de los servicios no destinados a la venta en España se justifica exclusivamente por la asunción de tareas educativas y sanitarias por parte del Estado.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Aunque el desarrollo del Estado del Bienestar (sanidad y educación) es vital, el fuerte avance también se justifica por la profunda descentralización de las Administraciones Públicas a nivel autonómico y local.","tag":"T5","_type":"vf"},{"text":"Dentro de la estructura productiva española, la rama de hostelería presenta una relevancia significativamente mayor que en el promedio de la Unión Europea.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La hostelería representa en torno a un 8,9% del total de la producción de servicios en España, una cifra que contrasta fuertemente con la media mucho menor del 3,7% en la UE-27.","tag":"T5","_type":"vf"},{"text":"Los servicios vinculados al bienestar, como la sanidad y la educación, mantienen en España un peso relativo en la producción superior a la media de la UE-27.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"A pesar de su importancia social, las actividades sanitarias y de servicios sociales en España ostentan un peso relativo en la producción de servicios (8,4%) netamente inferior a la media comunitaria de la UE-27 (10,2%).","tag":"T5","_type":"vf"},{"text":"En la estructura del comercio exterior español, la actividad de 'turismo y viajes' es la única que registra un superávit comercial en la balanza de servicios.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Aunque el turismo es el principal aportador neto, no es el único. Diversos sectores como los transportes, telecomunicaciones, informática y otros servicios empresariales registran actualmente sólidos superávits comerciales.","tag":"T5","_type":"vf"},{"text":"Aunque el turismo sigue siendo el pilar fundamental, las exportaciones españolas de servicios han mostrado una tendencia hacia la diversificación en las últimas décadas.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"Desde 1990 en adelante, se ha evidenciado un claro aumento en la presencia y peso relativo de otras actividades terciarias (servicios a empresas, finanzas, TIC) en la cesta exportadora española de servicios.","tag":"T5","_type":"vf"},{"text":"Las ganancias de productividad han sido el motor principal del crecimiento de la producción total de servicios en España durante las últimas décadas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El principal motor del crecimiento de la producción ha sido el incremento intensivo de la cantidad de empleo, ya que la aportación de las ganancias de productividad ha sido francamente reducida (29,8% en España frente al 39,8% europeo).","tag":"T5","_type":"vf"},{"text":"La incorporación de las nuevas tecnologías de la información ha permitido ganancias de productividad en la distribución comercial a través de la expansión de las ventas online.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"En la distribución comercial, la incorporación de las TIC ha sido clave para favorecer la expansión del comercio digital y las ventas online, logrando consolidar notables avances de productividad.","tag":"T5","_type":"vf"},{"text":"El descenso de la productividad en la hostelería española se explica en parte por la gran dimensión de sus empresas, que genera ineficiencias organizativas.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El descenso secular de la productividad en la hostelería se explica por factores diametralmente opuestos: una elevada intensidad en trabajo combinada con una 'reducida' (no gran) dimensión de las empresas, que les impide aprovechar ventajas de economías de escala.","tag":"T5","_type":"vf"},{"text":"España presenta una posición de productividad por hora trabajada superior a la media de la UE-27 en actividades financieras y de seguros.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"De forma anómala frente al resto del sector terciario nacional, las actividades financieras y de seguros registran unos niveles de productividad por hora trabajada muy superiores y favorables respecto a la media europea.","tag":"T5","_type":"vf"},{"text":"El lento avance de la productividad en los servicios en España se debe a una especialización en actividades con elevada intensidad de capital físico.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"Se debe precisamente a una especialización sectorial volcada en actividades de 'baja' intensidad en capital físico y humano (como la hostelería y la distribución tradicional), que son por el contrario muy intensivas en mano de obra no cualificada.","tag":"T5","_type":"vf"},{"text":"La escasa competencia en numerosas actividades terciarias ha actuado como un freno para la modernización tecnológica y organizativa del sector en España.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"La escasa o nula exposición a la competencia real ha sido uno de los lastres históricos que ha retrasado la modernización, la adopción tecnológica y los incentivos para optimizar la organización del sector.","tag":"T5","_type":"vf"},{"text":"La liberalización de servicios en Europa desde los años 90 ha implicado una mayor intervención en la fijación de precios por parte del Estado.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"El proceso de desregulación y liberalización implica, entre otras medidas fundamentales, la libertad de fijación de precios y la paulatina eliminación del intervencionismo estatal.","tag":"T5","_type":"vf"},{"text":"En el transporte ferroviario español de pasajeros, la legislación actual impide la entrada de empresas privadas para competir con el operador público en alta velocidad.","options":["Verdadero","Falso"],"correct":1,"razonamiento":"La legislación comunitaria y nacional actual no solo no lo impide, sino que ha promovido la liberalización: hoy en España compiten activamente tres operadores diferentes (Renfe, Ouigo e Iryo) en el mercado de alta velocidad.","tag":"T5","_type":"vf"},{"text":"La liberalización del transporte aéreo en España ha permitido mejorar la accesibilidad y conectividad de los consumidores gracias a la entrada de aerolíneas de bajo coste.","options":["Verdadero","Falso"],"correct":0,"razonamiento":"El fin del monopolio estatal y la plena apertura de los mercados impulsaron la aparición de aerolíneas de bajo co
