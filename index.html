ron como factores limitantes la política fiscal de control del déficit impuesta por el Pacto de Estabilidad (que llevó a superávits en 2005-2007) y el gran deterioro del saldo exterior, propiciado por la desbordante demanda interna, la inflación diferencial y la escasa competitividad.","Los factores contractivos fueron la apreciación del euro frente al dólar, que redujo la competitividad exterior, y el estancamiento de la demanda de los principales socios comerciales europeos."],"correct":2,"razonamiento":"Actuaron como limitantes: una política fiscal de control del déficit impuesta por el Pacto de Estabilidad (que llevó incluso a superávits en 2005-2007), y el gran deterioro de la demanda externa o saldo exterior, propiciado por una demanda interna desbordante, inflación diferencial, reducida competitividad/productividad, y el empuje de economías emergentes.","tag":"Tema 1","_type":"test"},{"text":"¿Qué problemas estructurales ocultaba el patrón de crecimiento del periodo 1995-2007?","options":["El principal problema fue la excesiva dependencia de las exportaciones industriales de alto valor añadido, vulnerables a perturbaciones en la demanda exterior de los socios comerciales.","El patrón ocultaba graves deficiencias estructurales: especialización en sectores de baja tecnología, escasas ganancias de productividad, un mercado laboral muy dual, un sistema financiero sobreexpuesto al sector inmobiliario y un sector público con ineficiencias e infraestructuras innecesarias.","El modelo era básicamente sólido, pero presentaba el riesgo de una eventual apreciación del euro que pudiera erosionar la competitividad de las exportaciones e incrementar el déficit exterior.","Los problemas se reducían a la elevada deuda pública acumulada para financiar infraestructuras, que hipotecaba la capacidad de respuesta fiscal sin afectar a la estructura productiva privada."],"correct":1,"razonamiento":"La larga bonanza enmascaró problemas críticos: especialización productiva en sectores de tecnología media-baja; debilidades organizativas y de competitividad empresarial; un mercado laboral muy dual con escasas ganancias de productividad; dependencia del sistema financiero de capitales extranjeros focalizados en el inmobiliario; y un sector público ineficiente con infraestructuras innecesarias y ausencia de reformas preventivas.","tag":"Tema 1","_type":"test"},{"text":"¿Qué factores externos propiciaron la crisis financiera de 2008-2014?","options":["Los factores externos determinantes fueron la subida de precios de materias primas y petróleo (generando inflación y caída de rentas), la crisis financiera originada en EE.UU. por las hipotecas subprime y la ingeniería financiera, y la profunda crisis de confianza derivada de la pérdida de credibilidad del sistema.","La crisis vino exclusivamente del derrumbe de la demanda alemana, que como principal socio comercial de España arrastró las exportaciones españolas y generó un efecto dominó sobre la economía.","El factor externo principal fue la apreciación del euro frente al dólar y el yen, que encareció las exportaciones europeas y provocó el colapso de los sectores exportadores de la eurozona.","La crisis fue desencadenada por la decisión del BCE de subir tipos de forma abrupta para combatir la inflación del boom, sin que existieran desequilibrios financieros externos relevantes."],"correct":0,"razonamiento":"Los factores externos determinantes fueron la subida de los precios del petróleo y materias primas (generando inflación y caída de rentas), la crisis financiera originada en EE.UU. por la burbuja inmobiliaria y las hipotecas subprime, y una profunda crisis de confianza por la pérdida de credibilidad del sistema financiero global.","tag":"Tema 1","_type":"test"},{"text":"¿Cuál de las siguientes combinaciones describe correctamente los desequilibrios internos de España en la crisis de 2008? [Abundancia de liquidez previa / BCE subió tipos al inicio / Interrupción de flujos de capital / Política mone // ── ESTADO ────────────────────────────────────────────────────────────────────
const vfBank    = VF_DATA;
const testBank  = TEST_DATA;
let manualBank  = [];

let questions   = [];
let testOrder   = [];
let testIdx     = 0;
let answered    = {};
let testActive  = false;
let wrongOnly   = [];
let currentMode = null;

const STORAGE_KEY = 'tipotestv2_manual';
const LETTERS     = ['A','B','C','D','E'];

// ── PARSE (solo para importar) ────────────────────────────────────────────────
function parseQuestionData(data, defaultTag) {
  defaultTag = defaultTag || '';
  if (Array.isArray(data))
    return data.filter(q => q.text && Array.isArray(q.options) && typeof q.correct === 'number');
  if (typeof data !== 'object' || !data) return [];
  const result = [];
  for (const key of Object.keys(data)) {
    const q = data[key];
    if (!q.enunciado) continue;
    if (Array.isArray(q.opciones) && q.respuesta) {
      const idx = ['A','B','C','D','E'].indexOf(q.respuesta.toUpperCase());
      if (idx !== -1 && idx < q.opciones.length)
        result.push({ text: q.enunciado, options: q.opciones, correct: idx,
          razonamiento: q.razonamiento || '', tag: q.tag || defaultTag, _type: 'manual' });
    } else if (q.respuesta === 'Verdadero' || q.respuesta === 'Falso') {
      result.push({ text: q.enunciado, options: ['Verdadero','Falso'],
        correct: q.respuesta === 'Verdadero' ? 0 : 1,
        razonamiento: q.razonamiento || '', tag: q.tag || defaultTag, _type: 'manual' });
    }
  }
  return result;
}

// ── MANUAL BANK ───────────────────────────────────────────────────────────────
function saveManual()  { localStorage.setItem(STORAGE_KEY, JSON.stringify(manualBank)); }
function loadManual()  {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) manualBank = JSON.parse(r); }
  catch { manualBank = []; }
}

// ── UTILIDADES ────────────────────────────────────────────────────────────────
function toast(msg, dur) {
  dur = dur || 2500;
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function updateUI() {
  document.getElementById('count-vf').textContent   = vfBank.length   + ' preguntas';
  document.getElementById('count-test').textContent  = testBank.length  + ' preguntas';
  document.getElementById('count-mix').textContent   = (vfBank.length + testBank.length) + ' preguntas';
  document.getElementById('header-stats').textContent =
    vfBank.length + ' V/F  ·  ' + testBank.length + ' Test  ·  ' + (vfBank.length+testBank.length) + ' total';
}

// ── FORMULARIO BANCO ──────────────────────────────────────────────────────────
function buildOptionInputs(n) {
  n = n || 4;
  const c = document.getElementById('options-inputs');
  c.innerHTML = '';
  for (let i=0; i<n; i++) {
    const r = document.createElement('div');
    r.className = 'option-input-row';
    r.innerHTML = '<label for="opt-radio-'+i+'">'+LETTERS[i]+'</label>' +
      '<input type="radio" name="correct-opt" id="opt-radio-'+i+'" value="'+i+'" />' +
      '<input type="text" id="opt-text-'+i+'" placeholder="Opción '+LETTERS[i]+'" />';
    c.appendChild(r);
  }
}
buildOptionInputs(4);

document.getElementById('btn-add').addEventListener('click', () => {
  const text = document.getElementById('new-question').value.trim();
  if (!text) { toast('⚠ Escribe el enunciado'); return; }
  const opts = [];
  for (let i=0; i<5; i++) { const el = document.getElementById('opt-text-'+i); if (el) { const v = el.value.trim(); if (v) opts.push(v); } }
  if (opts.length < 2) { toast('⚠ Añade al menos 2 opciones'); return; }
  const cr = document.querySelector('input[name="correct-opt"]:checked');
  if (!cr) { toast('⚠ Marca la opción correcta'); return; }
  const ci = parseInt(cr.value);
  if (ci >= opts.length) { toast('⚠ La opción correcta no existe'); return; }
  const tag = document.getElementById('new-tag').value.trim();
  manualBank.push({ text, options: opts, correct: ci, tag, _type: 'manual', razonamiento: '' });
  saveManual(); renderBanco(); toast('✓ Pregunta añadida');
  document.getElementById('new-question').value = '';
  document.getElementById('new-tag').value = '';
  buildOptionInputs(4);
});

// ── BANCO: LISTA ──────────────────────────────────────────────────────────────
function allBancoQuestions() { return [...vfBank, ...testBank, ...manualBank]; }

function renderBanco(filter) {
  filter = filter || '';
  const list = document.getElementById('question-list');
  const all  = allBancoQuestions();
  document.getElementById('banco-count').textContent = all.length;
  const lo = filter.toLowerCase();
  const filtered = all.map((q,i)=>({q,i})).filter(({q}) =>
    !filter || q.text.toLowerCase().includes(lo) || (q.tag && q.tag.toLowerCase().includes(lo)));
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><span>📭</span>' + (filter ? 'Sin resultados' : 'No hay preguntas.') + '</div>';
    return;
  }
  list.innerHTML = '';
  filtered.forEach(({q,i}) => {
    const item = document.createElement('div');
    item.className = 'question-list-item';
    const tl = q._type==='vf'?'V/F':q._type==='test'?'Test':'Manual';
    const tc = q._type==='vf'?'vf':q._type==='test'?'test':'manual';
    item.innerHTML = '<div class="q-info"><div class="q-num">#'+(i+1)+(q.tag?' · '+q.tag:'')+'<span class="type-badge '+tc+'">'+tl+'</span></div>' +
      '<div class="q-text">'+q.text.substring(0,110)+(q.text.length>110?'…':'')+'</div></div>' +
      '<div class="q-actions">'+( q._type==='manual'?'<button class="btn btn-danger btn-sm" data-del="'+i+'">✕</button>':'')+'</div>';
    list.appendChild(item);
  });
}

document.getElementById('question-list').addEventListener('click', (e) => {
  const b = e.target.closest('[data-del]');
  if (!b) return;
  const idx = parseInt(b.dataset.del);
  const q   = allBancoQuestions()[idx];
  if (q._type !== 'manual') return;
  const mi = manualBank.indexOf(q);
  if (confirm('¿Eliminar esta pregunta?')) {
    manualBank.splice(mi,1); saveManual();
    renderBanco(document.getElementById('banco-search').value);
    toast('Pregunta eliminada');
  }
});
document.getElementById('banco-search').addEventListener('input', e => renderBanco(e.target.value));

// ── IMPORTAR / EXPORTAR ───────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const all = allBancoQuestions();
  if (!all.length) { toast('No hay preguntas'); return; }
  const b = new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'preguntas_exportadas.json'; a.click();
});
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      let imp = parseQuestionData(data);
      if (!imp.length) throw new Error();
      manualBank.push(...imp); saveManual(); renderBanco();
      toast('✓ ' + imp.length + ' preguntas importadas');
    } catch { toast('⚠ JSON inválido'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});
document.getElementById('btn-clear-manual').addEventListener('click', () => {
  if (!manualBank.length) { toast('No hay preguntas manuales'); return; }
  if (confirm('¿Eliminar todas las preguntas manuales?')) {
    manualBank=[]; saveManual(); renderBanco(); toast('Banco manual vaciado');
  }
});

// ── MODO ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-card').forEach(c => c.addEventListener('click', () => startMode(c.dataset.mode)));

function startMode(mode) {
  currentMode = mode;
  if (mode==='vf')        questions = [...vfBank];
  else if (mode==='test') questions = [...testBank];
  else                     questions = [...vfBank,...testBank];
  if (!questions.length) { toast('⚠ No hay preguntas'); return; }
  startTest();
}

function backToModeSelect() {
  testActive = false;
  document.getElementById('mode-select-view').style.display      = '';
  document.getElementById('test-active-controls').style.display  = 'none';
  document.getElementById('progress-wrap').style.display         = 'none';
  document.getElementById('question-card').style.display         = 'none';
  document.getElementById('score-card').classList.remove('show');
}
document.getElementById('btn-back-mode').addEventListener('click', backToModeSelect);
document.getElementById('btn-back-mode-score').addEventListener('click', backToModeSelect);

// ── TEST ──────────────────────────────────────────────────────────────────────
function startTest(pool) {
  testOrder  = pool ? [...pool] : shuffle(questions.map((_,i)=>i));
  testIdx    = 0; answered = {}; wrongOnly = []; testActive = true;
  document.getElementById('mode-select-view').style.display     = 'none';
  document.getElementById('test-active-controls').style.display = 'block';
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('progress-wrap').style.display        = 'block';
  document.getElementById('question-card').style.display        = 'flex';
  renderQuestion();
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  if (!testActive) return;
  testOrder=shuffle(testOrder); testIdx=0; answered={}; renderQuestion(); toast('Preguntas mezcladas');
});
document.getElementById('btn-retry').addEventListener('click', () => startTest());
document.getElementById('btn-retry-wrong').addEventListener('click', () => {
  if (!wrongOnly.length) { toast('No tienes falladas'); return; }
  startTest(wrongOnly);
});

function renderQuestion() {
  const total = testOrder.length;
  const qIdx  = testOrder[testIdx];
  const q     = questions[qIdx];
  document.getElementById('progress-label').textContent = 'Pregunta '+(testIdx+1)+' de '+total;
  document.getElementById('progress-bar').style.width   = ((testIdx/total)*100)+'%';
  const cor = Object.values(answered).filter(a=>a.correct).length;
  const wr  = Object.values(answered).filter(a=>!a.correct).length;
  document.getElementById('score-inline').innerHTML = '✓ '+cor+' &nbsp; ✗ '+wr;
  document.getElementById('q-tag').textContent       = q.tag || 'Sin etiqueta';
  document.getElementById('q-id-label').textContent  = '#'+(qIdx+1);
  document.getElementById('question-text').textContent = q.text;
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-letter">'+LETTERS[i]+'</span><span>'+opt+'</span>';
    btn.addEventListener('click', () => handleAnswer(i, qIdx));
    grid.appendChild(btn);
  });
  if (answered[testIdx] !== undefined) showAnswerState(answered[testIdx].chosen, qIdx);
  else { document.getElementById('feedback-box').classList.remove('show'); document.getElementById('btn-next').disabled=true; }
  document.getElementById('btn-prev').style.visibility = testIdx===0?'hidden':'visible';
  document.getElementById('btn-next').textContent = testIdx===total-1?'Ver resultado':'Siguiente →';
}

function handleAnswer(chosen, qIdx) {
  if (answered[testIdx] !== undefined) return;
  answered[testIdx] = { correct: chosen===questions[qIdx].correct, chosen };
  showAnswerState(chosen, qIdx);
}

function showAnswerState(chosen, qIdx) {
  const q = questions[qIdx];
  const ok = chosen===q.correct;
  document.querySelectorAll('#options-grid .option-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i===q.correct) btn.classList.add('correct');
    if (i===chosen && !ok) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box show ' + (ok?'correct-fb':'wrong-fb');
  const base = ok ? '✓ ¡Correcto!' : '✗ Incorrecto. La respuesta correcta es: '+LETTERS[q.correct]+'. '+q.options[q.correct];
  fb.textContent = q.razonamiento ? base+'\n\n📖 '+q.razonamiento : base;
  document.getElementById('btn-next').disabled = false;
  const cor = Object.values(answered).filter(a=>a.correct).length;
  const wr  = Object.values(answered).filter(a=>!a.correct).length;
  document.getElementById('score-inline').innerHTML = '✓ '+cor+' &nbsp; ✗ '+wr;
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (testIdx < testOrder.length-1) { testIdx++; renderQuestion(); } else showScore();
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (testIdx>0) { testIdx--; renderQuestion(); }
});

function showScore() {
  const total = testOrder.length;
  const cor   = Object.values(answered).filter(a=>a.correct).length;
  const pct   = Math.round((cor/total)*100);
  wrongOnly   = testOrder.filter((_,i)=>answered[i]&&!answered[i].correct);
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('progress-bar').style.width    = '100%';
  document.getElementById('progress-label').textContent  = 'Test completado';
  document.getElementById('score-card').classList.add('show');
  document.getElementById('score-num').textContent    = pct+'%';
  document.getElementById('score-detail').textContent = cor+' correctas de '+total+' · '+(total-cor)+' falladas';
  testActive = false;
}

// ── BÚSQUEDA ──────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  const c = document.getElementById('search-results');
  if (!q) { c.style.display='none'; return; }
  const all = [...vfBank,...testBank];
  const matches = all.map((item,i)=>({item,i})).filter(({item}) =>
    item.text.toLowerCase().includes(q.toLowerCase()) ||
    (item.tag && item.tag.toLowerCase().includes(q.toLowerCase())));
  if (!matches.length) { c.style.display='block'; c.innerHTML='<div class="search-result-item" style="color:var(--text-muted);">Sin resultados</div>'; return; }
  c.style.display='block';
  c.innerHTML = matches.slice(0,8).map(({item,i}) =>
    '<div class="search-result-item" data-goto="'+i+'" data-src-type="'+item._type+'">' +
    '<div class="result-num">#'+(i+1)+(item.tag?' · '+item.tag:'')+'</div>'+
    item.text.substring(0,120)+(item.text.length>120?'…':'')+'</div>'
  ).join('');
});

document.getElementById('search-results').addEventListener('click', (e) => {
  const item = e.target.closest('[data-goto]');
  if (!item) return;
  const srcType  = item.dataset.srcType;
  const pool     = srcType==='vf' ? vfBank : testBank;
  const mode     = srcType==='vf' ? 'vf' : 'test';
  const globalIdx = parseInt(item.dataset.goto);
  const localIdx  = srcType==='vf' ? globalIdx : globalIdx - vfBank.length;
  if (currentMode !== mode || !testActive) {
    currentMode = mode; questions = [...pool];
    testOrder=[...questions.map((_,i)=>i)]; testIdx=0; answered={}; wrongOnly=[]; testActive=true;
    document.getElementById('mode-select-view').style.display     = 'none';
    document.getElementById('test-active-controls').style.display = 'block';
    document.getElementById('score-card').classList.remove('show');
    document.getElementById('progress-wrap').style.display        = 'block';
    document.getElementById('question-card').style.display        = 'flex';
  }
  const pos = testOrder.indexOf(localIdx);
  if (pos !== -1) testIdx = pos;
  renderQuestion();
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-input').value = '';
});

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const id = tab.dataset.tab;
    document.getElementById('panel-test').classList.toggle('active', id==='test');
    document.getElementById('panel-banco').classList.toggle('active', id==='banco');
    if (id==='banco') renderBanco(document.getElementById('banco-search').value);
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadManual();
updateUI();
renderBanco();
</script>
</body>
</html>
